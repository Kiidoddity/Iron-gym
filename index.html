#sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:width .25s ease,min-width .25s ease,border-color .25s ease;
  position:relative;z-index:10;
  flex-shrink:0;
}
#sidebar.collapsed{width:0;min-width:0;border-right-color:transparent;}
#sidebar-header{padding:24px 16px 16px;border-bottom:1px solid var(--border);white-space:nowrap;}
#sidebar-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);line-height:1;}
#sidebar-header p{color:var(--muted);font-size:10px;letter-spacing:1px;margin-top:4px;}
#muscle-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;}
#muscle-list::-webkit-scrollbar,#log-area::-webkit-scrollbar{width:3px;}
#muscle-list::-webkit-scrollbar-thumb,#log-area::-webkit-scrollbar-thumb{background:var(--border);}
/* ── Swipe-to-delete: sidebar muscle items ── */
.muscle-item{
  display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;border-left:3px solid transparent;
  transition:background .15s,border-color .15s;white-space:nowrap;
  position:relative;overflow:hidden;
}
.muscle-delete-reveal{
  position:absolute;right:0;top:0;bottom:0;width:72px;
  background:var(--accent2);display:flex;align-items:center;justify-content:center;
  font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;
  cursor:pointer;z-index:0;
}
.muscle-item:hover{background:var(--active);}
.muscle-item.active{background:var(--active);border-left-color:var(--accent);}
.muscle-name{flex:1;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
.muscle-item.active .muscle-name{color:var(--accent);}
.side-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s;}
.muscle-item:hover .side-actions{opacity:1;}
.icon-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;
  transition:color .15s;flex-shrink:0;
}
.icon-btn:hover{color:var(--accent);}
.icon-btn.delete:hover{color:var(--accent2);}
.muscle-name-input{
  background:none;border:none;border-bottom:1px solid var(--accent);color:var(--accent);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  font-weight:500;width:100%;outline:none;padding:1px 0;
}
.muscle-confirm{display:flex;align-items:center;gap:6px;padding:8px 16px;white-space:nowrap;width:100%;}
.muscle-confirm-msg{flex:1;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.muscle-confirm-yes{background:var(--accent2);border:none;color:#fff;padding:5px 10px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.muscle-confirm-no{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.muscle-confirm-no:hover{border-color:var(--text);color:var(--text);}
#add-muscle-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin:4px 14px 16px;padding:10px 14px;
  background:none;border:none;border-top:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;transition:color .15s;width:calc(100% - 28px);
}
#add-muscle-btn:hover{color:var(--accent);}


#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}

#top-bar{
  padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;gap:14px;flex-shrink:0;
}
#top-left{min-width:0;}
#no-group-hint{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
#group-info{display:none;}
#main-title{
  font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;line-height:1;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none;
}
#main-title:hover{color:var(--accent);transition:color .15s;}
#main-subtitle{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
#top-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#session-progress{
  color:var(--accent);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:none;
}
#menu-toggle{
  background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;padding:8px 10px;border-radius:2px;
  display:flex;flex-direction:column;gap:4px;flex-shrink:0;transition:border-color .15s;
}
#menu-toggle:hover{border-color:var(--accent);}
#menu-toggle span{display:block;width:16px;height:1.5px;background:var(--text);transition:background .15s;}
#menu-toggle:hover span{background:var(--accent);}

#content-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
#no-selection{
  flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);
}
#no-selection .giant{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#1a1a1a;letter-spacing:8px;}
#no-selection p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}

#log-area{flex:1;overflow-y:auto;padding:24px;display:none;}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);}
.empty-state p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}

.session-block{margin-bottom:24px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.session-details{
  background:var(--entry-bg);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
}
.session-summary{
  list-style:none;
  cursor:pointer;
  padding:18px 14px 10px 14px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  background:var(--panel);
  padding-right:38px;
}
.session-summary::-webkit-details-marker{display:none;}
.session-shell{
  position:relative;
}
.delete-session-btn{
  position:absolute;
  top:8px;
  right:10px;
  z-index:3;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:16px;
  line-height:1;
  padding:2px 6px;
}
.delete-session-btn:hover{
  color:var(--accent2);
}
.session-summary-left{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.session-date{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;
}
.session-meta{
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--muted);
}
.session-chevron{
  color:var(--muted);
  font-size:16px;
  transition:transform .15s ease,color .15s ease;
  flex-shrink:0;
  position:relative;
  top:6px;
}
.session-details[open] .session-chevron{
  transform:rotate(90deg);
  color:var(--accent);
}
.session-content{
  padding:12px 12px 4px;
}
.exercise-card{background:var(--entry-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;}

/* ── Swipe-to-delete: exercise cards ── */
.exercise-card{
  background:var(--entry-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;
}
.exercise-delete-reveal{
  position:absolute;right:0;top:0;bottom:0;width:80px;
  background:var(--accent2);display:flex;align-items:center;justify-content:center;
  font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;
  cursor:pointer;z-index:0;border-radius:0 4px 4px 0;
}
.exercise-header{
  display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);gap:12px;
  user-select:none;
}
.drag-handle{
  color:var(--border);font-size:14px;cursor:grab;padding:0 6px 0 0;flex-shrink:0;
  touch-action:none;letter-spacing:1px;
}
.drag-handle:active{cursor:grabbing;color:var(--muted);}
.exercise-card.dragging{opacity:0.4;border-color:var(--accent);}
.exercise-card.drag-over{border-top:2px solid var(--accent);}
.exercise-name{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;min-width:0;flex:1;}
.exercise-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.edit-entry-btn,.delete-entry-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;transition:color .15s;
}
.edit-entry-btn:hover{color:var(--accent);}
.delete-entry-btn:hover{color:var(--accent2);}
.sets-table{width:100%;border-collapse:collapse;}
.sets-table th{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 14px;text-align:left;font-weight:400;
}
.sets-table td{padding:6px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:top;}
.sets-table td:first-child{color:var(--muted);font-size:10px;}
.quick-edit{
  background:none;border:none;border-bottom:1px solid transparent;
  color:var(--text);font-family:'DM Mono',monospace;font-size:13px;
  width:60px;padding:0 2px;text-align:left;outline:none;cursor:pointer;
  transition:border-color .15s;
}
.quick-edit:focus{border-bottom-color:var(--accent);cursor:text;background:rgba(232,255,71,.05);}
.quick-edit.empty{color:var(--muted);}
.arm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.arm-box{display:flex;gap:6px;align-items:center;white-space:nowrap;}
.arm-tag{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.progress-badge{
  margin:0 14px 10px;
  color:var(--green);
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.rejoin-session-btn{
  background:#000;
  border:1px solid var(--border);
  color:#fff;
  padding:8px 10px;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:1px;
  cursor:pointer;
  font-size:10px;
  margin:0 0 10px auto;
  display:inline-flex;
  align-self:flex-end;
}
.rejoin-session-btn:hover{
  border-color:#fff;
  color:#fff;
}

#composer-wrap{
  border-top:1px solid var(--border);
  background:linear-gradient(to top, var(--bg), var(--panel));
  padding:14px 18px 18px;
  flex-shrink:0;
  width:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
#action-stack{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
#plus-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;}
#plus-btn{
  width:52px;height:52px;border-radius:50%;
  border:1px solid var(--border);
  background:var(--panel);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;line-height:1;cursor:pointer;transition:.15s;
}
#plus-btn:hover{border-color:var(--accent);background:#181818;}
#plus-btn.open{transform:rotate(45deg);}
#plus-menu{
  display:none;flex-direction:column;gap:8px;align-items:center;
  width:min(420px,100%);
}
#plus-menu.open{display:flex;}
#composer-actions-row{width:min(420px,100%);display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:2px;}
.session-btn{width:min(420px,100%);}
.action-btn{
  width:100%;background:none;border:1px solid var(--border);color:var(--text);padding:10px 14px;
  border-radius:3px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-size:11px;
  transition:.15s;background:var(--panel);
}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.danger:hover{border-color:var(--accent2);color:var(--accent2);}

#session-form-wrap{
  display:none;
  width:min(520px,100%);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:6px;
  padding:16px;
  position:relative;
  z-index:30;
}
#session-form-wrap.open{display:block;box-shadow:0 0 0 1px rgba(232,255,71,.15);}

#form-topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
#close-form-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:22px;
  line-height:1;
  cursor:pointer;
  padding:0 4px;
}
#close-form-btn:hover{color:var(--accent);}
#session-form-wrap h3{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;
}
.form-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.form-row label,.mini-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
}
.field, .num-input, .date-input{
  background:var(--entry-bg);border:1px solid var(--border);color:var(--text);outline:none;border-radius:3px;
}
.field,.date-input{
  width:100%;padding:10px 12px;
}
.field:focus,.num-input:focus,.date-input:focus{border-color:var(--accent);}
.inline-grid{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:14px;}
.sets-box{width:95px;}
.num-input{
  width:100%;
  padding:10px 10px;
  text-align:center;
  appearance:textfield;
  -moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{appearance:none;margin:0;}
#sets-detail{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.set-row{
  border:1px solid var(--border);
  background:var(--entry-bg);
  border-radius:4px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.set-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.set-label{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.toggle-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toggle-chip{
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--muted);
  padding:6px 10px;
  border-radius:999px;
  cursor:pointer;
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.toggle-chip.active{color:var(--accent);border-color:var(--accent);}
.set-inputs,.arm-inputs{display:flex;gap:10px;flex-wrap:wrap;}
.input-block{flex:1;min-width:100px;}
.arm-inputs{display:none;}
.arm-inputs.active{display:flex;}
.drop-set-wrap{
  display:none;
  border-top:1px solid var(--border);
  padding-top:8px;
  margin-top:2px;
}
.drop-set-wrap.active{display:block;}
.drop-set-grid{
  display:grid;
  grid-template-columns:1.1fr .9fr .9fr;
  gap:8px;
}
.drop-set-grid .input-block{min-width:0;}
.drop-title{
  font-size:8px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.drop-set-wrap .num-input{
  padding:8px 9px;
  font-size:14px;
}
.drop-set-wrap .mini-label{
  font-size:8px;
  letter-spacing:1px;
}
.helper{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.prev-target{
  font-size:9px;
  color:#7a7a7a;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:5px;
  min-height:12px;
}
.notice{
  border:1px solid rgba(125,255,138,.25);
  background:rgba(125,255,138,.06);
  color:var(--green);
  padding:8px 10px;
  border-radius:4px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:1px;
  display:none;
  margin-bottom:12px;
}
.notice.show{display:block;}

#save-feedback{
  display:none;
  color:var(--green);
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:8px;
}
#save-feedback.show{
  display:block;
}

#form-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:8px;
}
#log-exercise-btn{
  background:var(--accent);
  color:#000;
  border:none;
  padding:10px 18px;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:1px;
  cursor:pointer;
  font-size:11px;
}
#log-exercise-btn:hover{
  background:#fff;
}

.hidden{display:none!important;}

@media (max-width: 700px){
  #top-bar{padding:12px 14px;}
  #main-title{font-size:30px;}
  #log-area{padding:14px;}
  #composer-wrap{padding:12px 14px 14px;}
  #session-form-wrap{padding:14px;}
  .drop-set-grid{
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
  }
  .drop-set-wrap .num-input{
    padding:7px 8px;
    font-size:13px;
  }
}

function buildNameDatalists(){
  const exerciseNames = [];
  const dropNames = [];
  const seenExercises = new Set();
  const seenDrops = new Set();

  const allLogs = Object.values(state.logs || {}).flat();
  allLogs.forEach(entry => {
    const ex = String(entry.exercise || '').trim();
    if (ex && !seenExercises.has(ex.toLowerCase())){
      seenExercises.add(ex.toLowerCase());
      exerciseNames.push(ex);
    }
    (entry.sets || []).forEach(set => {
      const dn = String(set.dropName || '').trim();
      if (dn && !seenDrops.has(dn.toLowerCase())){

        dropNames.push(dn);

  });

    .join('');

function parseExpressionSum(value){
  if (value === null || value === undefined) return 0;
  const matches = String(value).replace(/,/g, '').match(/-?\d+(?:\.\d+)?/g);
  if (!matches) return 0;
  return matches.map(Number).reduce((a,b)=>a+b,0);
}

function setVolume(set){
  // Volume = reps × weight per arm/side, summed
  if (!set) return 0;
  if (set.singleArm){
    const l = parseExpressionSum(set.leftReps) * parseExpressionSum(set.leftWeight);
    const r = parseExpressionSum(set.rightReps) * parseExpressionSum(set.rightWeight);
    return l + r;
  }
  return parseExpressionSum(set.reps) * parseExpressionSum(set.weight);
}

function setMainScore(set){
  // Keep backward-compat alias used elsewhere
  return setVolume(set);
}

function exerciseVolume(entry){
  // Total volume = sum of (reps × weight) across all non-drop sets
  return (entry.sets || []).filter(s => !s.dropSet).reduce((sum, set)=> sum + setVolume(set), 0);
}

function exerciseMainScore(entry){
  return exerciseVolume(entry);
}

function setProgressed(currentSet, previousSet){
  return setVolume(currentSet) > setVolume(previousSet);
}

function dropSetScore(set){
  if (!set || !set.dropSet) return 0;
  return parseExpressionSum(set.dropReps) + parseExpressionSum(set.dropWeight);
}

function findPreviousDropMatch(exerciseName, dropName, currentDate, excludeId){
  if (!dropName) return null;
  const logs = getLogs()
    .filter(e => e.exercise && e.exercise.toLowerCase() === String(exerciseName || '').toLowerCase())
    .filter(e => e.id !== excludeId)
    .slice()
    .sort((a,b)=> ((b.date||'') + (b.order||0) + (b.id||'')).localeCompare((a.date||'') + (a.order||0) + (a.id||'')));

  for (const entry of logs){
    if ((entry.date || '') > currentDate) continue;
    for (const set of (entry.sets || [])){
      if (set.dropSet && String(set.dropName || '').trim().toLowerCase() === String(dropName).trim().toLowerCase()){
        return set;
      }
    }
  }
  return null;
}

function formatLoggedWeight(value){
  const text = String(value ?? '').trim();
  if (!text || text === '—') return '—';
  return `${text} lbs`;
}

function groupLogsByDate(logs){
  const byDate = {};
  logs.forEach(entry=>{
    const d = entry.date || 'No date';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(entry);
  });
  return byDate;
}

function getEntrySessionId(entry){
  return entry && entry.sessionId ? entry.sessionId : `legacy:${entry && entry.date ? entry.date : 'No date'}`;
}

function getSessionEntries(sessionId){
  return getLogs()
    .filter(entry => getEntrySessionId(entry) === sessionId)
    .sort((a,b)=> (a.order||0) - (b.order||0));
}

function getSessionGroups(logs){
  const map = new Map();
  logs.forEach(entry => {
    const sessionId = getEntrySessionId(entry);
    if (!map.has(sessionId)){
      map.set(sessionId, {
        sessionId,
        date: entry.date || 'No date',
        createdAt: entry.createdAt || '',
        entries: []
      });
    }
    const group = map.get(sessionId);
    group.entries.push(entry);
    const created = entry.createdAt || entry.id || '';
    if (created > group.createdAt) group.createdAt = created;
    if ((entry.date || '') > (group.date || '')) group.date = entry.date || group.date;
  });

  const groups = Array.from(map.values());
  groups.forEach(group => {
    group.entries.sort((a,b)=> (a.order||0) - (b.order||0));
  });
  groups.sort((a,b)=> {
    const ad = (a.date || '') + (a.createdAt || '');
    const bd = (b.date || '') + (b.createdAt || '');
    return bd.localeCompare(ad);
  });
  return groups;
}

function moveSessionDate(sessionId, newDate){
  if (!activeId || !sessionId || !newDate) return;
  const entries = getSessionEntries(sessionId);
  if (!entries.length) return;
  entries.forEach((entry, idx) => {
    entry.date = newDate;
    entry.order = idx;
  });
  if (sessionDraft){
    sessionDraft.date = newDate;
    sessionDraft.sessionId = sessionId;
  }
  currentSessionDate = newDate;
  currentSessionId = sessionId;
  saveState();
}

          <button class="sc-yes" style="background:var(--accent2);border:none;color:#fff;padding:4px 10px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Delete</button>

          state.logs[gid] = (state.logs[gid]||[]).filter(e=>getEntrySessionId(e)!==sessionId);

  els.logArea.querySelectorAll('.edit-entry-btn').forEach(btn=>{

  // ── Touch drag-to-reorder exercise cards ──────────────────────────────────
  attachDragReorder();
}

function attachDragReorder(){
  const handles = Array.from(els.logArea.querySelectorAll('.drag-handle'));
  if(!handles.length) return;

  let dragCard = null, dragId = null, startY = 0, originIndex = 0;
  let placeholder = null;

  function getCards(){
    return Array.from(els.logArea.querySelectorAll('.exercise-card[data-entry-id]'));
  }

  handles.forEach(handle => {
    handle.addEventListener('touchstart', (e)=>{
      e.stopPropagation();
      dragId = handle.dataset.id;
      dragCard = handle.closest('.exercise-card');
      if(!dragCard) return;
      startY = e.touches[0].clientY;
      originIndex = getCards().indexOf(dragCard);
      dragCard.classList.add('dragging');

      // Create placeholder
      placeholder = document.createElement('div');
      placeholder.style.cssText = `height:${dragCard.offsetHeight}px;background:transparent;border:1px dashed var(--border);border-radius:4px;margin-bottom:8px;`;
      dragCard.parentNode.insertBefore(placeholder, dragCard.nextSibling);
    },{passive:true});

    handle.addEventListener('touchmove', (e)=>{
      if(!dragCard) return;
      e.preventDefault();
      const dy = e.touches[0].clientY - startY;
      dragCard.style.transform = `translateY(${dy}px)`;
      dragCard.style.position = 'relative';
      dragCard.style.zIndex = '100';

      // Find which card we're hovering over
      const cards = getCards().filter(c => c !== dragCard);
      const touchY = e.touches[0].clientY;
      let insertBefore = null;
      for(const card of cards){
        const rect = card.getBoundingClientRect();
        if(touchY < rect.top + rect.height / 2){
          insertBefore = card;
          break;
        }
      }
      // Move placeholder
      if(insertBefore){
        insertBefore.parentNode.insertBefore(placeholder, insertBefore);
      } else {
        const parent = dragCard.parentNode;
        if(parent) parent.appendChild(placeholder);
      }
    },{passive:false});

    handle.addEventListener('touchend', ()=>{
      if(!dragCard) return;
      dragCard.style.transform = '';
      dragCard.style.position = '';
      dragCard.style.zIndex = '';
      dragCard.classList.remove('dragging');

      // Move card to placeholder position
      if(placeholder && placeholder.parentNode){
        placeholder.parentNode.insertBefore(dragCard, placeholder);
        placeholder.remove();
      }

      // Reorder in state by reading DOM order
      const newOrder = getCards().map(c => c.dataset.entryId);
      if(activeId && state.logs[activeId]){
        newOrder.forEach((id, idx) => {
          const entry = state.logs[activeId].find(e => e.id === id);
          if(entry) entry.order = idx;
        });
        saveState();
      }

      dragCard = null; dragId = null; placeholder = null;
    });
  });
}

function attachWheelInput(input){
  input.addEventListener('wheel', (e)=>{
    const isTextLike = input.type === 'text';
    if (isTextLike) return;
    e.preventDefault();
    const step = parseFloat(input.step || '1') || 1;
    const min = input.min !== '' ? parseFloat(input.min) : -Infinity;
    let value = input.value === '' ? 0 : parseFloat(input.value);
    if (isNaN(value)) value = 0;
    value += e.deltaY > 0 ? -step : step;
    if (value < min) value = min;
    input.value = (Math.round(value * 100) / 100).toString().replace(/\.0+$/,'');
    input.dispatchEvent(new Event('input', {bubbles:true}));
  }, {passive:false});
}

function readSetRow(row){
  const singleArm = row.querySelector('.single-arm-toggle').classList.contains('active');
  const dropSet = row.querySelector('.drop-set-toggle').classList.contains('active');

  const base = {
    dropSet,
    dropName: row.querySelector('.drop-name-input') ? row.querySelector('.drop-name-input').value : '',
    dropReps: row.querySelector('.drop-reps-input') ? row.querySelector('.drop-reps-input').value : '',
    dropWeight: row.querySelector('.drop-weight-input') ? row.querySelector('.drop-weight-input').value : ''
  };

  if (singleArm){
    return {
      singleArm: true,
      leftReps: row.querySelector('.left-reps-input').value,
      leftWeight: row.querySelector('.left-weight-input').value,
      rightReps: row.querySelector('.right-reps-input').value,
      rightWeight: row.querySelector('.right-weight-input').value,
      ...base
    };
  }
  return {
    singleArm: false,
    reps: row.querySelector('.reps-input').value,
    weight: row.querySelector('.weight-input').value,
    ...base
  };
}

function getLatestExercise(){
  const logs = getLogs();
  if (!logs.length) return null;
  return logs.slice().sort((a,b)=> ((b.date||'') + (b.order||0) + (b.id||'')).localeCompare((a.date||'') + (a.order||0) + (a.id||'')))[0];
}

function getLatestSessionDate(){
  const logs = getLogs();
  if (!logs.length) return null;
  return logs.slice().sort((a,b)=>((b.date||'') + (b.id||'')).localeCompare((a.date||'') + (a.id||'')))[0].date || null;
}

function getPreviousSessionDateBefore(dateStr){
  const dates = [...new Set(getLogs().map(e => e.date).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  return dates.find(d => d < dateStr) || null;
}

function getReferenceExerciseForCurrentForm(){
  const exerciseName = els.exerciseName.value.trim().toLowerCase();
  const currentDate = currentSessionDate || els.inputDate.value || todayStr();
  if (!exerciseName) return null;

  // Find the most recent previous entry with this exercise name before currentDate
  return findPreviousSameExercise(exerciseName, currentDate, editingEntryId);
}

function getSessionByDate(date){
  return getLogs().filter(e => (e.date || '') === date).sort((a,b)=> (a.order||0) - (b.order||0));
}

function getLatestSessionGroupBefore(dateStr){
  const groups = getSessionGroups(getLogs()).filter(group => (group.date || '') < dateStr);
  return groups.length ? groups[0] : null;
}


function parseMaybeNumber(value){
  if (value === null || value === undefined) return NaN;
  const match = String(value).replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return match ? parseFloat(match[0]) : NaN;
}

function compareProgress(current, previous){
  if (!current || !previous) return '';

  const currentTotal = exerciseMainScore(current);
  const previousTotal = exerciseMainScore(previous);

  return currentTotal > previousTotal ? 'Nice progression!' : '';
}

function findPreviousSameExercise(exerciseName, currentDate, excludeId){
  const logs = getLogs()
    .filter(e => e.exercise && e.exercise.toLowerCase() === exerciseName.toLowerCase())
    .filter(e => e.id !== excludeId)
    // Also exclude any entry in the current active session so we compare against a prior session
    .filter(e => !currentSessionId || getEntrySessionId(e) !== currentSessionId)
    .slice()
    .sort((a,b)=> ((b.date||'') + (b.order||0) + (b.id||'')).localeCompare((a.date||'') + (a.order||0) + (a.id||'')));

  // Return the most recent entry whose date is strictly before or on currentDate
  return logs.find(e => (e.date || '') <= currentDate) || null;
}

function updatePreviousTargets(){
  const reference = getReferenceExerciseForCurrentForm();
  const rows = Array.from(els.setsDetail.querySelectorAll('.set-row'));

  rows.forEach((row, i) => {
    const prevSet = reference && reference.sets ? reference.sets[i] : null;
    const setIsSingle = row.querySelector('.single-arm-toggle').classList.contains('active');

    const setText = (selector, text) => {
      const el = row.querySelector(selector);
      if (el) el.textContent = text || '';
    };

    if (!prevSet) {
      setText('.prev-reps-target', '');
      setText('.prev-weight-target', '');
      setText('.prev-left-reps-target', '');
      setText('.prev-left-weight-target', '');
      setText('.prev-right-reps-target', '');
      setText('.prev-right-weight-target', '');
      return;
    }

    if (setIsSingle || prevSet.singleArm) {
      setText('.prev-reps-target', '');
      setText('.prev-weight-target', '');
      setText('.prev-left-reps-target', prevSet.leftReps !== undefined && prevSet.leftReps !== '' ? `Last: ${prevSet.leftReps}` : '');
      setText('.prev-left-weight-target', prevSet.leftWeight !== undefined && prevSet.leftWeight !== '' ? `Last: ${prevSet.leftWeight}` : '');
      setText('.prev-right-reps-target', prevSet.rightReps !== undefined && prevSet.rightReps !== '' ? `Last: ${prevSet.rightReps}` : '');
      setText('.prev-right-weight-target', prevSet.rightWeight !== undefined && prevSet.rightWeight !== '' ? `Last: ${prevSet.rightWeight}` : '');
    } else {
      setText('.prev-reps-target', prevSet.reps !== undefined && prevSet.reps !== '' ? `Last: ${prevSet.reps}` : '');
      setText('.prev-weight-target', prevSet.weight !== undefined && prevSet.weight !== '' ? `Last: ${prevSet.weight}` : '');
      setText('.prev-left-reps-target', '');
      setText('.prev-left-weight-target', '');
      setText('.prev-right-reps-target', '');
      setText('.prev-right-weight-target', '');
    }
  });
}

function updateProgressNotice(){
  const exerciseName = els.exerciseName.value.trim();
  if (!exerciseName){
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
    return;
  }
  const exercise = buildExercisePreviewFromForm();
  if (!exercise){
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
    return;
  }
  if (currentSessionDate) {
    exercise.date = currentSessionDate;
  }
  const prev = findPreviousSameExercise(exerciseName, exercise.date, editingEntryId);
  const summary = compareProgress(exercise, prev);
  if (summary){
    els.progressNotice.textContent = summary;
    els.progressNotice.classList.add('show');
  } else {
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
  }
}
els.exerciseName.addEventListener('input', ()=>{
  updatePreviousTargets();
  updateProgressNotice();
});
els.inputDate.addEventListener('input', ()=>{
  const chosenDate = els.inputDate.value || todayStr();
  if (currentSessionId && currentSessionDate && chosenDate !== currentSessionDate){
    moveSessionDate(currentSessionId, chosenDate);
  } else if (!currentSessionDate && sessionDraft){
    sessionDraft.date = chosenDate;
    currentSessionDate = chosenDate;
    saveState();
  }
  updatePreviousTargets();
  updateProgressNotice();
  renderMain();
});


function collapseExerciseForm(){
  els.formWrap.classList.remove('open');
  els.progressNotice.textContent = '';
  els.progressNotice.classList.remove('show');
  plusOpen = false;
  els.plusBtn.classList.remove('open');
  els.plusMenu.classList.remove('open');
}

els.closeFormBtn.addEventListener('click', (e)=>{
  e.preventDefault();
  e.stopPropagation();
  collapseExerciseForm();
});

document.addEventListener('click', (e)=>{
  const clickedInsideForm = e.target.closest('#session-form-wrap');
  const clickedPlus = e.target.closest('#plus-btn');
  const clickedPlusMenu = e.target.closest('#plus-menu');

  if (!els.formWrap.classList.contains('open')) return;
  if (clickedInsideForm || clickedPlus || clickedPlusMenu) return;

  collapseExerciseForm();
});

function resetEditor(){
  editingEntryId = null;
  sessionDraft = null;
  currentSessionDate = null;
  currentSessionId = null;
  clearFormOnly();
  els.inputDate.value = todayStr();
  collapseExerciseForm();
  renderMain();
}

function commitExerciseToLogs(exercise, keepSessionOpen=true){
  if (!state.logs[activeId]) state.logs[activeId] = [];

  exercise.progressSummary = compareProgress(
    exercise,
    findPreviousSameExercise(exercise.exercise, exercise.date, exercise.id)
  );
  exercise.createdAt = exercise.createdAt || new Date().toISOString();

  if (editingEntryId){
    const idx = state.logs[activeId].findIndex(e => e.id === editingEntryId);
    if (idx !== -1){
      exercise.order = state.logs[activeId][idx].order || 0;
      exercise.createdAt = state.logs[activeId][idx].createdAt || exercise.createdAt;
      exercise.sessionId = state.logs[activeId][idx].sessionId || getEntrySessionId(state.logs[activeId][idx]);
      state.logs[activeId][idx] = exercise;
    }
    editingEntryId = null;
    sessionDraft = null;
    saveState();
    clearFormOnly();
    collapseExerciseForm();
    renderMain();
    return;
  }

  startSessionIfNeeded();
  // The exercise date comes from the form's date picker — treat it as the source of truth
  // and sync currentSessionDate to it rather than the other way around
  currentSessionDate = exercise.date;
  exercise.sessionId = currentSessionId || (sessionDraft && sessionDraft.sessionId) || getEntrySessionId(exercise);
  sessionDraft.date = exercise.date;
  sessionDraft.sessionId = exercise.sessionId;
  currentSessionId = exercise.sessionId;

  const sessionEntries = getSessionEntries(exercise.sessionId);
  exercise.order = sessionEntries.length;

  state.logs[activeId].push(exercise);
  saveState();
  renderMain();

  els.saveFeedback.classList.add('show');
  setTimeout(() => {
    els.saveFeedback.classList.remove('show');
  }, 1400);

  if (!keepSessionOpen){
    finalizeSession();
  } else {
    clearFormOnly();
    els.inputDate.value = sessionDraft.date || todayStr();
    collapseExerciseForm();
    els.logArea.scrollTo({top: 0, behavior: 'smooth'});
  }
}


function resetFormForNextExercise(){
  clearFormOnly();
  editingEntryId = null;
  els.inputDate.value = currentDraftDate() || todayStr();
  els.progressNotice.textContent = '';
  els.progressNotice.classList.remove('show');
  openForm();
}

function saveCurrentExercise(keepSessionOpen=true){
  const exercise = buildExerciseFromForm();
  if (!exercise) return false;
  commitExerciseToLogs(exercise, keepSessionOpen);
  return true;
}

els.logExerciseBtn.addEventListener('click', ()=>{
  saveCurrentExercise(true);
});

els.exerciseName.addEventListener('keydown', (e)=>{
  if (e.key === 'Enter') {
    e.preventDefault();
    saveCurrentExercise(true);
  }
});

function finalizeSession(){
  if (editingEntryId){
    resetEditor();
    toggleSidebar(true);
    return;
  }

  const sessionId = currentSessionId || (sessionDraft && sessionDraft.sessionId) || null;
  const entries = sessionId ? getSessionEntries(sessionId) : [];

  let totalSets = 0;
  let progressedSets = 0;

  entries.forEach(entry => {
    const prevExercise = findPreviousSameExercise(entry.exercise || '', entry.date || '', entry.id);
    (entry.sets || []).forEach((set, i) => {
      if (set.dropSet) return;
      totalSets += 1;
      const prevSet = prevExercise && prevExercise.sets ? prevExercise.sets[i] : null;
      if (prevSet && setProgressed(set, prevSet)) progressedSets += 1;
    });
  });

  sessionDraft = null;
  currentSessionDate = null;
  currentSessionId = null;
  clearFormOnly();
  closePlusMenu();
  els.inputDate.value = todayStr();
  saveState();
  saveUIState();
  renderMain();
  toggleSidebar(true);

  if (progressedSets > 0){
    // Show "Good workout!" banner in log area instead of alert
    const banner = document.createElement('div');
    banner.style.cssText = 'color:var(--green);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:14px;animation:fadeIn .3s ease;';
    banner.textContent = `Good workout! ${progressedSets}/${totalSets} lifts improved`;
    els.logArea.insertBefore(banner, els.logArea.firstChild);
    setTimeout(()=> banner.remove(), 4000);
  } else {
    const banner = document.createElement('div');
    banner.style.cssText = 'color:var(--green);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:14px;animation:fadeIn .3s ease;';
    banner.textContent = 'Good workout!';
    els.logArea.insertBefore(banner, els.logArea.firstChild);
    setTimeout(()=> banner.remove(), 3000);
  }
}

els.startSessionBtn.addEventListener('click', ()=>{
  const _d = els.inputDate.value || todayStr();
  if(checkSameDayRejoin(_d)) return;
  const chosenDate = _d;
  currentSessionDate = chosenDate;
  currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  sessionDraft = {date: chosenDate, sessionId: currentSessionId};
  saveState();
  openForm();
  els.inputDate.value = chosenDate;
  updatePlusMenuVisibility();
  updatePreviousTargets();
  updateProgressNotice();
});

els.addExerciseBtn.addEventListener('click', ()=>{
  if (editingEntryId){
    // Show in-app prompt to save the open edit before opening a fresh form
    showSessionConfirm('Save last edited exercise?', 'Yes, Save', ()=>{
      saveCurrentExercise(true);
      // After saving, open fresh form
      editingEntryId = null;
      clearFormOnly();
      const chosenDate = currentDraftDate() || currentSessionDate || todayStr();
      els.inputDate.value = chosenDate;
      openPlusMenu(); openForm();
      updatePreviousTargets(); updateProgressNotice();
    });
    // Also wire the cancel to just discard the edit and open fresh
    // Override: replace confirmYes label and add a "Discard" option via cancel
    document.getElementById('confirm-cancel-btn').textContent = 'Discard & New';
    const origCancel = document.getElementById('confirm-cancel-btn');
    const freshHandler = ()=>{
      origCancel.textContent = 'Cancel';
      origCancel.removeEventListener('click', freshHandler);
      // Restore cancel to original
      editingEntryId = null;
      clearFormOnly();
      const chosenDate = currentDraftDate() || currentSessionDate || todayStr();
      els.inputDate.value = chosenDate;
      hideSessionConfirm();
      openPlusMenu(); openForm();
      updatePreviousTargets(); updateProgressNotice();
    };
    origCancel.addEventListener('click', freshHandler, {once:true});
    return;
  }
  const chosenDate = els.inputDate.value || todayStr();
  if (!currentSessionDate) currentSessionDate = chosenDate;
  startSessionIfNeeded();
  openForm();
  els.inputDate.value = currentDraftDate() || currentSessionDate || chosenDate;
  updatePreviousTargets();
  updateProgressNotice();
});

// ── In-app confirm for session actions ───────────────────────────────────────
const confirmRow = document.getElementById('confirm-row');
const confirmMsg  = document.getElementById('confirm-msg');
const confirmYes  = document.getElementById('confirm-yes-btn');
const confirmCancel = document.getElementById('confirm-cancel-btn');
let _confirmCallback = null;

function showSessionConfirm(msg, yesLabel, callback){
  confirmMsg.textContent = msg;
  confirmYes.textContent = yesLabel;
  _confirmCallback = callback;
  confirmRow.style.display = 'flex';
  // Hide the main session buttons while confirming
  els.endSessionBtn.style.display = 'none';
  els.deleteSessionComposerBtn.style.display = 'none';
}
function hideSessionConfirm(){
  confirmRow.style.display = 'none';
  _confirmCallback = null;
  // Restore buttons
  const inSession = !!(currentSessionId || currentSessionDate || sessionDraft);
  const inRealSession = inSession && !editingEntryId;
  els.endSessionBtn.style.display = inSession ? 'block' : 'none';
  els.deleteSessionComposerBtn.style.display = inRealSession ? 'block' : 'none';
}
confirmYes.addEventListener('click', ()=>{
  const cb = _confirmCallback;
  hideSessionConfirm();
  if(cb) cb();
});
confirmCancel.addEventListener('click', hideSessionConfirm);

els.endSessionBtn.addEventListener('click', ()=>{
  showSessionConfirm('End this session?', 'Yes, End', finalizeSession);
});

els.deleteSessionComposerBtn.addEventListener('click', ()=>{
  showSessionConfirm('Delete this session?', 'Yes, Delete', ()=>{
    const sessionId = currentSessionId || (sessionDraft && sessionDraft.sessionId);
    if (sessionId){
      Object.keys(state.logs).forEach(gid => {
        state.logs[gid] = (state.logs[gid] || []).filter(e => getEntrySessionId(e) !== sessionId);
      });
    }
    sessionDraft = null;
    currentSessionDate = null;
    currentSessionId = null;
    editingEntryId = null;
    clearFormOnly();
    closePlusMenu();
    els.inputDate.value = todayStr();
    saveState();
    saveUIState();
    renderMain();
    toggleSidebar(true);
  });
});

els.dupLastSessionBtn.addEventListener('click', ()=>{
  const targetDate = els.inputDate.value || currentSessionDate || todayStr();
  const lastGroup = getLatestSessionGroupBefore(targetDate) || getLatestSessionGroupBefore(todayStr());
  if (!lastGroup) return;

  const lastSession = lastGroup.entries;
  if (!lastSession.length) return;
  if (!state.logs[activeId]) state.logs[activeId] = [];

  const newSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

  lastSession.forEach((entry, idx)=>{
    state.logs[activeId].push({
      id:'entry_' + Date.now() + '_' + idx,
      date: targetDate,
      sessionId: newSessionId,
      exercise: entry.exercise,
      order: idx,
      createdAt: new Date().toISOString(),
      progressSummary: '',
      sets: (entry.sets || []).map(s=> s.singleArm ? createBlankSet(true) : createBlankSet(false))
    });
  });

  currentSessionDate = targetDate;
  currentSessionId = newSessionId;
  sessionDraft = {date: targetDate, sessionId: newSessionId};
  saveState();
  renderMain();
  closePlusMenu();
});

function saveDraftPreview(){
  // Draft preview stays in memory only.
}




// ── Persist UI state (survives app kill/lock screen) ──────────────────────────
const UISTATE_KEY = 'ironlog_uistate';
function saveUIState(){
  try{
    localStorage.setItem(UISTATE_KEY, JSON.stringify({
      activeId, sidebarOpen, currentSessionDate, currentSessionId, sessionDraft, editingEntryId,
      formOpen: els.formWrap.classList.contains('open'),
      formDate: els.inputDate.value,
      formExercise: els.exerciseName.value,
      formSets: els.setsInput.value,
      formSetData: Array.from(els.setsDetail.querySelectorAll('.set-row')).map(readSetRow)
    }));
  }catch(e){}
}
document.addEventListener('visibilitychange', saveUIState);
window.addEventListener('pagehide', saveUIState);
document.addEventListener('input', (e)=>{ if(e.target.closest('#session-form-wrap')) saveUIState(); });

// ── Same-day session rejoin prompt ────────────────────────────────────────────
function findSameDayOtherSession(date){
  return getSessionGroups(getLogs()).find(g =>
    g.date === date && g.sessionId !== currentSessionId && g.entries.length > 0
  ) || null;
}
function checkSameDayRejoin(chosenDate){
  if(currentSessionId || currentSessionDate || sessionDraft) return false;
  const other = findSameDayOtherSession(chosenDate);
  if(!other) return false;
  const label = new Date(chosenDate+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
  if(confirm(`You already have a session on ${label}.\nRejoin it instead of starting a new one?`)){
    currentSessionDate = chosenDate; currentSessionId = other.sessionId;
    sessionDraft = {date: chosenDate, sessionId: other.sessionId};
    saveState(); renderMain(); openForm();
    els.inputDate.value = chosenDate;
    updatePlusMenuVisibility(); updatePreviousTargets(); updateProgressNotice();
    return true;
  }
  return false;
}

function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

if (!els.inputDate.value) els.inputDate.value = todayStr();

function restoreUIState(){
  let ui = null;
  try{ ui = JSON.parse(localStorage.getItem(UISTATE_KEY)||'null'); }catch(e){ localStorage.removeItem(UISTATE_KEY); return false; }
  if(!ui) return false;
  try{
    if(ui.currentSessionId||ui.currentSessionDate||ui.sessionDraft){
      currentSessionId = ui.currentSessionId||null;
      currentSessionDate = ui.currentSessionDate||null;
      sessionDraft = ui.sessionDraft||null;
    }
    editingEntryId = ui.editingEntryId||null;
    if(ui.activeId && state.groups.find(g=>g.id===ui.activeId)) activeId = ui.activeId;
    if(ui.sidebarOpen===false) sidebarOpen = false;
    renderSidebar(); renderMain();
    if(!sidebarOpen) els.sidebar.classList.add('collapsed');
    const inSession = !!(currentSessionId||currentSessionDate||sessionDraft||editingEntryId);
    if(ui.formOpen && inSession){
      openPlusMenu(); openForm();
      if(ui.formDate) els.inputDate.value = ui.formDate;
      if(ui.formExercise) els.exerciseName.value = ui.formExercise;
      if(ui.formSets){ els.setsInput.value = ui.formSets; try{ buildSetsDetail(ui.formSetData||[]); }catch(e){ buildSetsDetail([]); } }
      updatePreviousTargets(); updateProgressNotice(); updatePlusMenuVisibility();
    }
    return true;
  }catch(e){ localStorage.removeItem(UISTATE_KEY); return false; }
}

const _restored = restoreUIState();
if(!_restored){ renderSidebar(); renderMain(); }
</script>

        focused.scrollIntoView({behavior:'smooth', block:'center'});
      }, 100);

      if (reg && reg.update) reg.update();
    } catch (e) {}
  });
}
