<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IRON LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0d0d;
      --panel:#141414;
      --sidebar:#111111;
      --border:#2a2a2a;
      --accent:#e8ff47;
      --accent2:#ff4747;
      --text:#f0f0f0;
      --muted:#666;
      --entry-bg:#1a1a1a;
      --active:#1e1e1e;
      --sidebar-w:220px;
      --green:#7dff8a;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:auto;}
    body{
      font-family:'DM Mono',monospace;
      background:var(--bg);
      color:var(--text);
      display:flex;
      font-size:13px;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
    }
    input,button,textarea,select{font:inherit;}
    input[type="text"],input[type="number"],input[type="date"]{font-size:16px;}

    #sidebar{
      width:var(--sidebar-w);
      min-width:var(--sidebar-w);
      background:var(--sidebar);
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:width .25s ease,min-width .25s ease,border-color .25s ease;
      position:relative;z-index:10;
      flex-shrink:0;
    }
    #sidebar.collapsed{width:0;min-width:0;border-right-color:transparent;}
    #sidebar-header{padding:24px 16px 16px;border-bottom:1px solid var(--border);white-space:nowrap;}
    #sidebar-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);line-height:1;}
    #sidebar-header p{color:var(--muted);font-size:10px;letter-spacing:1px;margin-top:4px;}
    #muscle-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;}
    #muscle-list::-webkit-scrollbar,#log-area::-webkit-scrollbar{width:3px;}
    #muscle-list::-webkit-scrollbar-thumb,#log-area::-webkit-scrollbar-thumb{background:var(--border);}
    .muscle-item{
      display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;border-left:3px solid transparent;
      transition:background .15s,border-color .15s;white-space:nowrap;
    }
    .muscle-item:hover{background:var(--active);}
    .muscle-item.active{background:var(--active);border-left-color:var(--accent);}
    .muscle-name{flex:1;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
    .muscle-item.active .muscle-name{color:var(--accent);}
    .side-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s;}
    .muscle-item:hover .side-actions{opacity:1;}
    .icon-btn{
      background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;
      transition:color .15s;flex-shrink:0;
    }
    .icon-btn:hover{color:var(--accent);}
    .icon-btn.delete:hover{color:var(--accent2);}
    .muscle-name-input{
      background:none;border:none;border-bottom:1px solid var(--accent);color:var(--accent);
      font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
      font-weight:500;width:100%;outline:none;padding:1px 0;
    }
    #add-muscle-btn{
      margin:8px 14px 16px;background:none;border:1px dashed var(--border);color:var(--muted);
      padding:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;
      text-transform:uppercase;transition:all .15s;border-radius:2px;white-space:nowrap;
    }
    #add-muscle-btn:hover{border-color:var(--accent);color:var(--accent);}

    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}

    #top-bar{
      padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;
      justify-content:space-between;gap:14px;flex-shrink:0;
    }
    #top-left{min-width:0;}
    #no-group-hint{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    #group-info{display:none;}
    #main-title{
      font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;line-height:1;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
    }
    #main-subtitle{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    #top-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    #session-progress{
      color:var(--accent);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:none;
    }
    #menu-toggle{
      background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;padding:8px 10px;border-radius:2px;
      display:flex;flex-direction:column;gap:4px;flex-shrink:0;transition:border-color .15s;
    }
    #menu-toggle:hover{border-color:var(--accent);}
    #menu-toggle span{display:block;width:16px;height:1.5px;background:var(--text);transition:background .15s;}
    #menu-toggle:hover span{background:var(--accent);}

    #content-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
    #no-selection{
      flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);
    }
    #no-selection .giant{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#1a1a1a;letter-spacing:8px;}
    #no-selection p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}

    #log-area{flex:1;overflow-y:auto;padding:24px;display:none;}
    .empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);}
    .empty-state p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}

    .session-block{margin-bottom:24px;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    .session-date{
      font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;
      display:flex;align-items:center;gap:10px;
    }
    .session-date::after{content:'';flex:1;height:1px;background:var(--border);}
    .exercise-card{background:var(--entry-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;}
    .exercise-header{
      display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);gap:12px;
    }
    .exercise-name{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;min-width:0;flex:1;}
    .exercise-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .edit-entry-btn,.delete-entry-btn{
      background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;transition:color .15s;
    }
    .edit-entry-btn:hover{color:var(--accent);}
    .delete-entry-btn:hover{color:var(--accent2);}
    .sets-table{width:100%;border-collapse:collapse;}
    .sets-table th{
      font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 14px;text-align:left;font-weight:400;
    }
    .sets-table td{padding:6px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:top;}
    .sets-table td:first-child{color:var(--muted);font-size:10px;}
    .arm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .arm-box{display:flex;gap:6px;align-items:center;white-space:nowrap;}
    .arm-tag{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .progress-badge{
      margin:0 14px 10px;
      color:var(--green);
      font-size:10px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    #composer-wrap{
      border-top:1px solid var(--border);
      background:linear-gradient(to top, var(--bg), var(--panel));
      padding:14px 18px 18px;
      flex-shrink:0;
      width:100%;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:calc(24px + env(safe-area-inset-bottom));
    }
    #action-stack{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    #plus-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;}
    #plus-btn{
      width:52px;height:52px;border-radius:50%;
      border:1px solid var(--border);
      background:var(--panel);color:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-size:34px;line-height:1;cursor:pointer;transition:.15s;
    }
    #plus-btn:hover{border-color:var(--accent);background:#181818;}
    #plus-btn.open{transform:rotate(45deg);}
    #plus-menu{
      display:none;flex-direction:column;gap:8px;align-items:center;
      width:min(420px,100%);
    }
    #plus-menu.open{display:flex;}
    #composer-actions-row{
      width:min(520px,100%);
      display:flex;
      justify-content:flex-end;
      align-items:center;
      margin-top:2px;
    }
    .composer-spacer{flex:1;}
    .end-session-fixed{
      width:auto;
      min-width:140px;
    }
    .action-btn{
      width:100%;background:none;border:1px solid var(--border);color:var(--text);padding:10px 14px;
      border-radius:3px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-size:11px;
      transition:.15s;background:var(--panel);
    }
    .action-btn:hover{border-color:var(--accent);color:var(--accent);}
    .action-btn.danger:hover{border-color:var(--accent2);color:var(--accent2);}

    #session-form-wrap{
      display:none;
      width:min(520px,100%);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:6px;
      padding:16px;
      position:relative;
      z-index:30;
    }
    #session-form-wrap.open{display:block;box-shadow:0 0 0 1px rgba(232,255,71,.15);}

    #form-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }
    #close-form-btn{
      background:none;
      border:none;
      color:var(--muted);
      font-size:22px;
      line-height:1;
      cursor:pointer;
      padding:0 4px;
    }
    #close-form-btn:hover{color:var(--accent);}
    #session-form-wrap h3{
      font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;
    }
    .form-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
    .form-row label,.mini-label{
      font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    }
    .field, .num-input, .date-input{
      background:var(--entry-bg);border:1px solid var(--border);color:var(--text);outline:none;border-radius:3px;
    }
    .field,.date-input{
      width:100%;padding:10px 12px;
    }
    .field:focus,.num-input:focus,.date-input:focus{border-color:var(--accent);}
    .inline-grid{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:14px;}
    .sets-box{width:95px;}
    .num-input{
      width:100%;
      padding:10px 10px;
      text-align:center;
      appearance:textfield;
      -moz-appearance:textfield;
    }
    .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{appearance:none;margin:0;}
    #sets-detail{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
    .set-row{
      border:1px solid var(--border);
      background:var(--entry-bg);
      border-radius:4px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .set-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .set-label{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .toggle-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .toggle-chip{
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--muted);
      padding:6px 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:10px;
      letter-spacing:1px;
      text-transform:uppercase;
    }
    .toggle-chip.active{color:var(--accent);border-color:var(--accent);}
    .set-inputs,.arm-inputs{display:flex;gap:10px;flex-wrap:wrap;}
    .input-block{flex:1;min-width:100px;}
    .arm-inputs{display:none;}
    .arm-inputs.active{display:flex;}
    .helper{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
    .prev-target{
      font-size:9px;
      color:#7a7a7a;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-top:5px;
      min-height:12px;
    }
    .notice{
      border:1px solid rgba(125,255,138,.25);
      background:rgba(125,255,138,.06);
      color:var(--green);
      padding:8px 10px;
      border-radius:4px;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:1px;
      display:none;
      margin-bottom:12px;
    }
    .notice.show{display:block;}

    #save-feedback{
      display:none;
      color:var(--green);
      font-size:10px;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-top:8px;
    }
    #save-feedback.show{
      display:block;
    }

    #form-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:8px;
    }
    #log-exercise-btn{
      background:var(--accent);
      color:#000;
      border:none;
      padding:10px 18px;
      border-radius:3px;
      text-transform:uppercase;
      letter-spacing:1px;
      cursor:pointer;
      font-size:11px;
    }
    #log-exercise-btn:hover{
      background:#fff;
    }

    .hidden{display:none!important;}

    @media (max-width: 700px){
      #top-bar{padding:12px 14px;}
      #main-title{font-size:30px;}
      #log-area{padding:14px;}
      #composer-wrap{padding:12px 14px 14px;}
      #session-form-wrap{padding:14px;}
    }
  </style>

  <meta name="theme-color" content="#b999e6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Log">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>IRON<br>LOG</h1>
      <p>GYM PROGRESSION</p>
    </div>
    <div id="muscle-list"></div>
    <button id="add-muscle-btn">+ Add Group</button>
  </div>

  <div id="main">
    <div id="top-bar">
      <div id="top-left">
        <div id="no-group-hint">Select a group</div>
        <div id="group-info">
          <div id="main-title"></div>
          <div id="main-subtitle"></div>
        </div>
      </div>
      <div id="top-actions">
        <div id="session-progress">In Session</div>
        <button id="menu-toggle" title="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <div id="content-wrap">
      <div id="no-selection">
        <div class="giant">LIFT</div>
        <p>Open the menu and pick a muscle group</p>
      </div>

      <div id="log-area"></div>

      <div id="composer-wrap" class="hidden">
        <div id="action-stack">
          <div id="plus-wrap">
            <button id="plus-btn" title="Session actions">+</button>
            <div id="plus-menu">
              <button class="action-btn" id="add-exercise-btn">Add Exercise</button>
              <button class="action-btn" id="duplicate-last-exercise-btn">Duplicate Last Exercise</button>
              <button class="action-btn" id="duplicate-last-session-btn">Duplicate Last Session</button>
            </div>
          </div>

          <div id="composer-actions-row">
            <div class="composer-spacer"></div>
            <button class="action-btn danger end-session-fixed" id="end-session-btn">End Session</button>
          </div>

          <div id="session-form-wrap">
            <div id="form-topbar">
              <h3>LOG EXERCISE</h3>
              <button type="button" id="close-form-btn">×</button>
            </div>
            <div id="progress-notice" class="notice"></div>

            <div class="form-row">
              <label class="mini-label">Date</label>
              <input type="date" id="input-date" class="date-input">
            </div>

            <div class="form-row">
              <input type="text" id="exercise-name-input" class="field" placeholder="">
            </div>

            <div class="inline-grid">
              <div class="sets-box">
                <label class="mini-label">Sets</label>
                <input type="number" id="sets-input" class="num-input" min="1" max="20" placeholder="">
              </div>
            </div>

            <div id="sets-detail"></div>

            <div id="form-actions">
              <button type="button" id="log-exercise-btn">Log Exercise</button>
            </div>
            <div id="save-feedback">Exercise saved</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const DEFAULT_GROUPS = [
  {id:'chest',name:'Chest'},
  {id:'back',name:'Back'},
  {id:'shoulders',name:'Shoulders'},
  {id:'arms',name:'Arms'},
  {id:'legs',name:'Legs'},
  {id:'core',name:'Core'}
];

function loadState(){
  try{
    return {
      groups: JSON.parse(localStorage.getItem('ironlog_groups') || 'null') || DEFAULT_GROUPS,
      logs: JSON.parse(localStorage.getItem('ironlog_logs') || '{}')
    };
  } catch(e){
    return {groups: DEFAULT_GROUPS, logs: {}};
  }
}
const state = loadState();

function saveState(){
  localStorage.setItem('ironlog_groups', JSON.stringify(state.groups));
  localStorage.setItem('ironlog_logs', JSON.stringify(state.logs));
}

let activeId = null;
let sidebarOpen = true;
let plusOpen = false;
let sessionDraft = null;
let currentSessionDate = null;
let editingEntryId = null;

const els = {
  sidebar: document.getElementById('sidebar'),
  muscleList: document.getElementById('muscle-list'),
  noSelection: document.getElementById('no-selection'),
  logArea: document.getElementById('log-area'),
  composerWrap: document.getElementById('composer-wrap'),
  mainTitle: document.getElementById('main-title'),
  mainSubtitle: document.getElementById('main-subtitle'),
  noGroupHint: document.getElementById('no-group-hint'),
  groupInfo: document.getElementById('group-info'),
  menuToggle: document.getElementById('menu-toggle'),
  plusBtn: document.getElementById('plus-btn'),
  plusMenu: document.getElementById('plus-menu'),
  addExerciseBtn: document.getElementById('add-exercise-btn'),
  dupLastExerciseBtn: document.getElementById('duplicate-last-exercise-btn'),
  dupLastSessionBtn: document.getElementById('duplicate-last-session-btn'),
  endSessionBtn: document.getElementById('end-session-btn'),
  formWrap: document.getElementById('session-form-wrap'),
  inputDate: document.getElementById('input-date'),
  exerciseName: document.getElementById('exercise-name-input'),
  setsInput: document.getElementById('sets-input'),
  setsDetail: document.getElementById('sets-detail'),
  sessionProgress: document.getElementById('session-progress'),
  progressNotice: document.getElementById('progress-notice'),
  logExerciseBtn: document.getElementById('log-exercise-btn'),
  saveFeedback: document.getElementById('save-feedback'),
  closeFormBtn: document.getElementById('close-form-btn')
};

function todayStr(){ return new Date().toISOString().split('T')[0]; }

function getLogs(){ return state.logs[activeId] || []; }

function toggleSidebar(force){
  sidebarOpen = force !== undefined ? force : !sidebarOpen;
  els.sidebar.classList.toggle('collapsed', !sidebarOpen);
}

els.menuToggle.addEventListener('click', ()=>toggleSidebar());

function renderSidebar(){
  els.muscleList.innerHTML = '';
  state.groups.forEach(group=>{
    const item = document.createElement('div');
    item.className = 'muscle-item' + (group.id === activeId ? ' active' : '');
    item.dataset.id = group.id;
    item.innerHTML = `
      <span class="muscle-name">${escapeHtml(group.name)}</span>
      <div class="side-actions">
        <button class="icon-btn rename" title="Rename">✎</button>
        <button class="icon-btn delete" title="Delete">✕</button>
      </div>
    `;
    item.addEventListener('click', (e)=>{
      if (e.target.closest('.side-actions')) return;
      setActive(group.id);
      if (window.innerWidth < 900) toggleSidebar(false);
    });
    item.querySelector('.rename').addEventListener('click', (e)=>{
      e.stopPropagation();
      startRenameGroup(group.id, item);
    });
    item.querySelector('.delete').addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteGroup(group.id);
    });
    els.muscleList.appendChild(item);
  });
}

function deleteGroup(id){
  const group = state.groups.find(g=>g.id===id);
  if (!group) return;
  if (!confirm(`Delete "${group.name}" and all its logs?`)) return;
  state.groups = state.groups.filter(g=>g.id!==id);
  delete state.logs[id];
  if (activeId === id){
    activeId = null;
    sessionDraft = null;
  }
  saveState();
  renderSidebar();
  renderMain();
}

function startRenameGroup(id, item){
  const group = state.groups.find(g=>g.id===id);
  const nameEl = item.querySelector('.muscle-name');
  const input = document.createElement('input');
  input.className = 'muscle-name-input';
  input.value = group.name;
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  function finish(){
    const value = input.value.trim();
    if (value){
      group.name = value;
      saveState();
    }
    renderSidebar();
    renderMain();
  }

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape'){
      input.value = group.name;
      input.blur();
    }
  });
}

document.getElementById('add-muscle-btn').addEventListener('click', ()=>{
  const id = 'group_' + Date.now();
  state.groups.push({id, name:'New Group'});
  saveState();
  renderSidebar();
  setTimeout(()=>{
    const item = document.querySelector(`.muscle-item[data-id="${id}"]`);
    if (item) startRenameGroup(id, item);
  }, 30);
});

function setActive(id){
  activeId = id;
  if (!currentSessionDate) sessionDraft = null;
  closePlusMenu();
  renderSidebar();
  renderMain();
}

function renderMain(){
  const group = state.groups.find(g=>g.id===activeId);
  if (!group){
    els.noSelection.style.display = 'flex';
    els.logArea.style.display = 'none';
    els.composerWrap.classList.add('hidden');
    els.noGroupHint.style.display = 'block';
    els.groupInfo.style.display = 'none';
    els.sessionProgress.style.display = 'none';
    return;

  els.noSelection.style.display = 'none';
  els.logArea.style.display = 'block';
  els.composerWrap.classList.remove('hidden');

  els.mainSubtitle.textContent = '';

  els.endSessionBtn.style.display = inSession ? 'block' : 'none';

function groupLogsByDate(logs){
  const byDate = {};
  logs.forEach(entry=>{
    const d = entry.date || 'No date';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(entry);
  });
  return byDate;
}


function renderLog(){
  const logs = getLogs().slice().sort((a,b)=> {
    const ad = (a.date || '') + (a.createdAt || a.id || '');
    const bd = (b.date || '') + (b.createdAt || b.id || '');
    return bd.localeCompare(ad);
  });

  if (!logs.length){
    els.logArea.innerHTML = `<div class="empty-state"><p>No sessions yet</p></div>`;
    return;
  }

  const byDate = groupLogsByDate(logs);
  const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  let html = '';
  dates.forEach(date=>{
    const label = date !== 'No date'
      ? new Date(date + 'T00:00:00').toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'long', year:'numeric'})
      : 'No date';
    const exercises = byDate[date].slice().sort((a,b)=> (a.order||0) - (b.order||0));
    const totalSets = exercises.reduce((sum, entry)=> sum + ((entry.sets || []).length), 0);
    const isCurrentSession = !!currentSessionDate && currentSessionDate === date;

    html += `
      <div class="session-block">
        <details class="session-details" data-date="${date}" ${isCurrentSession ? 'open' : ''}>
          <summary class="session-summary">
            <div class="session-summary-left">
              <div class="session-date">${label}</div>
              <div class="session-meta">${exercises.length} exercise${exercises.length===1?'':'s'} • ${totalSets} set${totalSets===1?'':'s'}${isCurrentSession ? ' • In Session' : ''}</div>
            </div>
            <div class="session-chevron">›</div>
          </summary>
          <div class="session-content">
            ${!isCurrentSession ? `<div class="session-actions-top"><button class="rejoin-session-btn" data-date="${date}">Rejoin Session</button></div>` : ''}
    `;

    exercises.forEach(entry=>{
      const prevExercise = findPreviousSameExercise(entry.exercise || '', entry.date || '', entry.id);
      const canEdit = isCurrentSession;
      html += `
        <div class="exercise-card" data-entry-id="${entry.id}">
          <div class="exercise-header">
            <span class="exercise-name">${escapeHtml(entry.exercise || '')}</span>
            <div class="exercise-actions">
              <button class="edit-entry-btn ${canEdit ? '' : 'disabled'}" data-id="${entry.id}" title="${canEdit ? 'Edit' : 'Rejoin session to edit'}" ${canEdit ? '' : 'disabled'}>✎</button>
              <button class="delete-entry-btn" data-id="${entry.id}" title="Delete">✕</button>
            </div>
          </div>
          <table class="sets-table">
            <tr><th>Set</th><th>Reps</th><th>Weight</th></tr>
      `;

      (entry.sets || []).forEach((set, i)=>{
        const prevSet = prevExercise && prevExercise.sets ? prevExercise.sets[i] : null;

        if (set.singleArm){
          const leftProg = prevSet && (parseMaybeNumber(set.leftReps) > parseMaybeNumber(prevSet.leftReps) || parseMaybeNumber(set.leftWeight) > parseMaybeNumber(prevSet.leftWeight));
          const rightProg = prevSet && (parseMaybeNumber(set.rightReps) > parseMaybeNumber(prevSet.rightReps) || parseMaybeNumber(set.rightWeight) > parseMaybeNumber(prevSet.rightWeight));
          const leftExtra = leftProg ? `<div class="helper" style="color:var(--green)">Nice progression!</div>` : '';
          const rightExtra = rightProg ? `<div class="helper" style="color:var(--green)">Nice progression!</div>` : '';
          html += `
            <tr>
              <td>${i+1}</td>
              <td>
                <div class="arm-grid">
                  <div><div class="arm-box"><span class="arm-tag">L</span><span>${set.leftReps ?? '—'}</span></div>${leftExtra}</div>
                  <div><div class="arm-box"><span class="arm-tag">R</span><span>${set.rightReps ?? '—'}</span></div>${rightExtra}</div>
                </div>
              </td>
              <td>
                <div class="arm-grid">
                  <div class="arm-box"><span class="arm-tag">L</span><span>${set.leftWeight ?? '—'}</span></div>
                  <div class="arm-box"><span class="arm-tag">R</span><span>${set.rightWeight ?? '—'}</span></div>
                </div>
              </td>
            </tr>
          `;
        } else {
          const setProg = prevSet && (parseMaybeNumber(set.reps) > parseMaybeNumber(prevSet.reps) || parseMaybeNumber(set.weight) > parseMaybeNumber(prevSet.weight));
          const progText = setProg ? `<div class="helper" style="color:var(--green)">Nice progression!</div>` : '';
          html += `<tr><td>${i+1}</td><td>${set.reps ?? '—'}${progText}</td><td>${set.weight ?? '—'}</td></tr>`;
        }
      });

      html += `</table></div>`;
    });

    html += `
          </div>
        </details>
      </div>
    `;
  });

  els.logArea.innerHTML = html;

  els.logArea.querySelectorAll('.delete-entry-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      const id = btn.dataset.id;
      const entry = getLogs().find(e => e.id === id);
      const label = entry && entry.exercise ? entry.exercise : 'this exercise';
      const ok = confirm(`Delete "${label}"?`);
      if (!ok) return;

      state.logs[activeId] = getLogs().filter(e=>e.id !== id);
      saveState();
      renderMain();
    });
  });

  els.logArea.querySelectorAll('.edit-entry-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      const id = btn.dataset.id;
      const entry = getLogs().find(x => x.id === id);
      if (!entry || !currentSessionDate || currentSessionDate !== entry.date) return;
      beginEditEntry(id);
    });
  });

  els.logArea.querySelectorAll('.rejoin-session-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      const date = btn.dataset.date;
      currentSessionDate = date;
      sessionDraft = {date};
      saveState();
      renderMain();
      closePlusMenu();
    });
  });
}
function beginEditEntry(id){

  editingEntryId = id;
  currentSessionDate = entry.date || todayStr();

function createBlankSet(singleArm=false){
  return singleArm
    ? {singleArm:true,leftReps:'',rightReps:'',leftWeight:'',rightWeight:''}
    : {singleArm:false,reps:'',weight:''};
}

function startSessionIfNeeded(){
  if (!currentSessionDate) currentSessionDate = els.inputDate.value || todayStr();
  if (!sessionDraft){
    sessionDraft = {date: currentSessionDate};
  }
  sessionDraft.date = currentSessionDate;
  els.sessionProgress.style.display = 'block';
}

function getDraftExercises(){
  if (!sessionDraft) return [];
  if (sessionDraft.exercises) return sessionDraft.exercises;
  return [sessionDraft];
}

function currentDraftDate(){
  if (currentSessionDate) return currentSessionDate;
  if (!sessionDraft) return '';

}

function isNewTrainingDay(){
  const logs = getLogs();
  if (!logs.length) return true;
  const latestDate = logs.slice().sort((a,b)=>((b.date||'') + (b.id||'')).localeCompare((a.date||'') + (a.id||'')))[0].date || '';

function updatePlusMenuVisibility(){

function buildSetsDetail(existingSets=null){

    const setData = prev[i] || createBlankSet(false);
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <div class="set-top">
        <div class="set-label">Set ${i+1}</div>
        <div class="toggle-line">
          <span class="mini-label">Single Arm</span>
          <button type="button" class="toggle-chip ${setData.singleArm ? 'active' : ''}">${setData.singleArm ? 'On' : 'Off'}</button>
        </div>
      </div>

      <div class="set-inputs ${setData.singleArm ? 'hidden' : ''}">
        <div class="input-block">
          <label class="mini-label">Reps</label>

        </div>
        <div class="input-block">
          <label class="mini-label">Weight (lbs)</label>
          <input type="text" class="num-input weight-input" value="${setData.weight ?? ''}" placeholder="" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false">
          <div class="prev-target prev-weight-target"></div>
        </div>
      </div>

      <div class="arm-inputs ${setData.singleArm ? 'active' : ''}">
        <div class="input-block">
          <label class="mini-label">Left Reps</label>
          <input type="text" class="num-input left-reps-input" value="${setData.leftReps ?? ''}" placeholder="" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false">
          <div class="prev-target prev-left-reps-target"></div>
        </div>
        <div class="input-block">
          <label class="mini-label">Left Weight (lbs)</label>
          <input type="text" class="num-input left-weight-input" value="${setData.leftWeight ?? ''}" placeholder="" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false">
          <div class="prev-target prev-left-weight-target"></div>
        </div>
        <div class="input-block">
          <label class="mini-label">Right Reps</label>
          <input type="text" class="num-input right-reps-input" value="${setData.rightReps ?? ''}" placeholder="" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false">
          <div class="prev-target prev-right-reps-target"></div>
        </div>
        <div class="input-block">
          <label class="mini-label">Right Weight (lbs)</label>
          <input type="text" class="num-input right-weight-input" value="${setData.rightWeight ?? ''}" placeholder="" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false">
          <div class="prev-target prev-right-weight-target"></div>
        </div>
      </div>
    `;
    const toggle = row.querySelector('.toggle-chip');
    toggle.addEventListener('click', ()=>{
      const active = toggle.classList.toggle('active');
      toggle.textContent = active ? 'On' : 'Off';
      row.querySelector('.set-inputs').classList.toggle('hidden', active);
      row.querySelector('.arm-inputs').classList.toggle('active', active);
      updatePreviousTargets();
      updateProgressNotice();
    });

    row.querySelectorAll('input').forEach(input=>{
      if (input.type === 'number') attachWheelInput(input);
      input.addEventListener('input', ()=>{
        updatePreviousTargets();
        updateProgressNotice();
      });
      input.addEventListener('focus', ()=> input.select());
    });

    els.setsDetail.appendChild(row);
  }
  updatePreviousTargets();
  updateProgressNotice();
}

function attachWheelInput(input){
  input.addEventListener('wheel', (e)=>{
    const isTextLike = input.type === 'text';
    if (isTextLike) return;
    e.preventDefault();
    const step = parseFloat(input.step || '1') || 1;
    const min = input.min !== '' ? parseFloat(input.min) : -Infinity;
    let value = input.value === '' ? 0 : parseFloat(input.value);
    if (isNaN(value)) value = 0;
    value += e.deltaY > 0 ? -step : step;
    if (value < min) value = min;
    input.value = (Math.round(value * 100) / 100).toString().replace(/\.0+$/,'');
    input.dispatchEvent(new Event('input', {bubbles:true}));
  }, {passive:false});
}

function readSetRow(row){
  const singleArm = row.querySelector('.toggle-chip').classList.contains('active');
  if (singleArm){
    return {
      singleArm: true,
      leftReps: row.querySelector('.left-reps-input').value,
      leftWeight: row.querySelector('.left-weight-input').value,
      rightReps: row.querySelector('.right-reps-input').value,
      rightWeight: row.querySelector('.right-weight-input').value
    };
  }
  return {
    singleArm: false,
    reps: row.querySelector('.reps-input').value,
    weight: row.querySelector('.weight-input').value
  };
}

els.setsInput.addEventListener('input', ()=> buildSetsDetail());

function normalizeSetValues(set){
  if (set.singleArm){
    return {
      singleArm: true,
      leftReps: String(set.leftReps ?? '').trim(),
      rightReps: String(set.rightReps ?? '').trim(),
      leftWeight: String(set.leftWeight ?? '').trim(),
      rightWeight: String(set.rightWeight ?? '').trim()
    };
  }
  return {
    singleArm: false,
    reps: String(set.reps ?? '').trim(),
    weight: String(set.weight ?? '').trim()
  };
}

function buildExerciseFromForm(){
  const date = els.inputDate.value || todayStr();

function buildExercisePreviewFromForm(){
  const date = els.inputDate.value || todayStr();
  const exercise = els.exerciseName.value.trim();
  const setsCount = parseInt(els.setsInput.value, 10);

  if (!exercise || !setsCount || !els.setsDetail.querySelector('.set-row')) {

function getLatestExercise(){
  const logs = getLogs();
  if (!logs.length) return null;
  return logs.slice().sort((a,b)=> ((b.date||'') + (b.order||0) + (b.id||'')).localeCompare((a.date||'') + (a.order||0) + (a.id||'')))[0];
}

function getLatestSessionDate(){
  const logs = getLogs();
  if (!logs.length) return null;
  return logs.slice().sort((a,b)=>((b.date||'') + (b.id||'')).localeCompare((a.date||'') + (a.id||'')))[0].date || null;
}

function getPreviousSessionDateBefore(dateStr){
  const dates = [...new Set(getLogs().map(e => e.date).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  return dates.find(d => d < dateStr) || null;
}

function getReferenceExerciseForCurrentForm(){
  const exerciseName = els.exerciseName.value.trim().toLowerCase();
  const currentDate = els.inputDate.value || todayStr();
  if (!exerciseName) return null;

  const prevSessionDate = getPreviousSessionDateBefore(currentDate);
  if (!prevSessionDate) return null;

  const prevSession = getSessionByDate(prevSessionDate);
  return prevSession.find(e => (e.exercise || '').trim().toLowerCase() === exerciseName) || null;
}

function getSessionByDate(date){
  return getLogs().filter(e => (e.date || '') === date).sort((a,b)=> (a.order||0) - (b.order||0));
}

function parseMaybeNumber(value){
  if (value === null || value === undefined) return NaN;
  const match = String(value).replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return match ? parseFloat(match[0]) : NaN;
}

function compareProgress(current, previous){
  if (!current || !previous) return '';

  let improvedWeight = false;
  let improvedReps = false;

  const len = Math.max(current.sets.length, previous.sets.length);
  for (let i=0; i<len; i++){
    const c = current.sets[i];
    const p = previous.sets[i];
    if (!c || !p) continue;

    if (c.singleArm || p.singleArm){
      const pairs = [
        ['leftReps','leftWeight'],
        ['rightReps','rightWeight']
      ];
      pairs.forEach(([rk, wk])=>{
        if (parseMaybeNumber(c[wk]) > parseMaybeNumber(p[wk])) improvedWeight = true;
        if (parseMaybeNumber(c[rk]) > parseMaybeNumber(p[rk])) improvedReps = true;
      });
    } else {
      if (parseMaybeNumber(c.weight) > parseMaybeNumber(p.weight)) improvedWeight = true;
      if (parseMaybeNumber(c.reps) > parseMaybeNumber(p.reps)) improvedReps = true;
    }
  }

  const parts = [];
  if (improvedWeight) parts.push('Weight up');
  if (improvedReps) parts.push('Reps up');
  return parts.length ? parts.join(' • ') : '';
}

function findPreviousSameExercise(exerciseName, currentDate, excludeId){
  const logs = getLogs()
    .filter(e => e.exercise && e.exercise.toLowerCase() === exerciseName.toLowerCase())
    .filter(e => e.id !== excludeId)
    .slice()
    .sort((a,b)=> ((b.date||'') + (b.order||0) + (b.id||'')).localeCompare((a.date||'') + (a.order||0) + (a.id||'')));

  return logs.find(e => (e.date || '') <= currentDate) || null;
}

function updatePreviousTargets(){
  const reference = getReferenceExerciseForCurrentForm();
  const rows = Array.from(els.setsDetail.querySelectorAll('.set-row'));

  rows.forEach((row, i) => {
    const prevSet = reference && reference.sets ? reference.sets[i] : null;
    const setIsSingle = row.querySelector('.toggle-chip').classList.contains('active');

    const setText = (selector, text) => {
      const el = row.querySelector(selector);
      if (el) el.textContent = text || '';
    };

    if (!prevSet) {
      setText('.prev-reps-target', '');
      setText('.prev-weight-target', '');
      setText('.prev-left-reps-target', '');
      setText('.prev-left-weight-target', '');
      setText('.prev-right-reps-target', '');
      setText('.prev-right-weight-target', '');
      return;
    }

    if (setIsSingle || prevSet.singleArm) {
      setText('.prev-reps-target', '');
      setText('.prev-weight-target', '');
      setText('.prev-left-reps-target', prevSet.leftReps !== undefined && prevSet.leftReps !== '' ? `Last: ${prevSet.leftReps}` : '');
      setText('.prev-left-weight-target', prevSet.leftWeight !== undefined && prevSet.leftWeight !== '' ? `Last: ${prevSet.leftWeight}` : '');
      setText('.prev-right-reps-target', prevSet.rightReps !== undefined && prevSet.rightReps !== '' ? `Last: ${prevSet.rightReps}` : '');
      setText('.prev-right-weight-target', prevSet.rightWeight !== undefined && prevSet.rightWeight !== '' ? `Last: ${prevSet.rightWeight}` : '');
    } else {
      setText('.prev-reps-target', prevSet.reps !== undefined && prevSet.reps !== '' ? `Last: ${prevSet.reps}` : '');
      setText('.prev-weight-target', prevSet.weight !== undefined && prevSet.weight !== '' ? `Last: ${prevSet.weight}` : '');
      setText('.prev-left-reps-target', '');
      setText('.prev-left-weight-target', '');
      setText('.prev-right-reps-target', '');
      setText('.prev-right-weight-target', '');
    }
  });
}

function updateProgressNotice(){
  const exerciseName = els.exerciseName.value.trim();
  if (!exerciseName){
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
    return;
  }
  const exercise = buildExercisePreviewFromForm();
  if (!exercise){
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
    return;
  }
  const prev = findPreviousSameExercise(exerciseName, exercise.date, editingEntryId);
  const summary = compareProgress(exercise, prev);
  if (summary){
    els.progressNotice.textContent = summary;
    els.progressNotice.classList.add('show');
  } else {
    els.progressNotice.textContent = '';
    els.progressNotice.classList.remove('show');
  }
}
els.exerciseName.addEventListener('input', ()=>{
  updatePreviousTargets();
  updateProgressNotice();
});
els.inputDate.addEventListener('input', ()=>{
  updatePreviousTargets();
  updateProgressNotice();
});

els.closeFormBtn.addEventListener('click', (e)=>{
  e.preventDefault();
  e.stopPropagation();
  collapseExerciseForm();
});

document.addEventListener('click', (e)=>{
  const clickedInsideForm = e.target.closest('#session-form-wrap');
  const clickedPlus = e.target.closest('#plus-btn');
  const clickedPlusMenu = e.target.closest('#plus-menu');

  if (!els.formWrap.classList.contains('open')) return;
  if (clickedInsideForm || clickedPlus || clickedPlusMenu) return;

  collapseExerciseForm();
});

function resetEditor(){
  editingEntryId = null;
  sessionDraft = null;
  currentSessionDate = null;
  clearFormOnly();
  els.inputDate.value = todayStr();
  collapseExerciseForm();
  renderMain();
}

function commitExerciseToLogs(exercise, keepSessionOpen=true){
  if (!state.logs[activeId]) state.logs[activeId] = [];

  exercise.progressSummary = compareProgress(
    exercise,
    findPreviousSameExercise(exercise.exercise, exercise.date, exercise.id)
  );
  exercise.createdAt = exercise.createdAt || new Date().toISOString();

  if (editingEntryId){
    const idx = state.logs[activeId].findIndex(e => e.id === editingEntryId);
    if (idx !== -1){
      exercise.order = state.logs[activeId][idx].order || 0;
      exercise.createdAt = state.logs[activeId][idx].createdAt || exercise.createdAt;
      state.logs[activeId][idx] = exercise;
    }
    editingEntryId = null;
    sessionDraft = null;
    saveState();
    clearFormOnly();
    collapseExerciseForm();
    renderMain();
    return;
  }

  startSessionIfNeeded();
  exercise.date = currentSessionDate || exercise.date;
  sessionDraft.date = exercise.date;

  const sameDayEntries = state.logs[activeId].filter(e => (e.date || '') === exercise.date);
  exercise.order = sameDayEntries.length;

  state.logs[activeId].push(exercise);
  saveState();
  renderMain();

  els.saveFeedback.classList.add('show');
  setTimeout(() => {
    els.saveFeedback.classList.remove('show');
  }, 1400);

  if (!keepSessionOpen){
    finalizeSession();
  } else {
    clearFormOnly();
    els.inputDate.value = sessionDraft.date || todayStr();
    collapseExerciseForm();
    els.logArea.scrollTo({top: 0, behavior: 'smooth'});
  }
}


function resetFormForNextExercise(){
  clearFormOnly();
  editingEntryId = null;
  els.inputDate.value = currentDraftDate() || todayStr();
  els.progressNotice.textContent = '';
  els.progressNotice.classList.remove('show');
  openForm();
}

function saveCurrentExercise(keepSessionOpen=true){
  const exercise = buildExerciseFromForm();
  if (!exercise) return false;
  commitExerciseToLogs(exercise, keepSessionOpen);
  return true;
}

els.logExerciseBtn.addEventListener('click', ()=>{
  saveCurrentExercise(true);
});

els.exerciseName.addEventListener('keydown', (e)=>{
  if (e.key === 'Enter') {
    e.preventDefault();
    saveCurrentExercise(true);
  }
});

function finalizeSession(){
  if (editingEntryId){
    resetEditor();
    toggleSidebar(true);
    return;
  }
  sessionDraft = null;
  currentSessionDate = null;
  clearFormOnly();
  closePlusMenu();
  els.inputDate.value = todayStr();
  renderMain();
  toggleSidebar(true);
}

els.addExerciseBtn.addEventListener('click', ()=>{
  if (editingEntryId){
    openForm();
    return;
  }
  startSessionIfNeeded();
  openForm();
  els.inputDate.value = currentDraftDate() || todayStr();
  updatePreviousTargets();
  updateProgressNotice();
});

els.endSessionBtn.addEventListener('click', finalizeSession);

els.dupLastExerciseBtn.addEventListener('click', ()=>{
  const last = getLatestExercise();
  startSessionIfNeeded();
  openForm();
  els.inputDate.value = currentDraftDate() || todayStr();

  if (!last){
    clearFormOnly();
    return;
  }

  editingEntryId = null;
  els.exerciseName.value = last.exercise || '';
  els.setsInput.value = (last.sets || []).length || '';
  buildSetsDetail((last.sets || []).map(s=> s.singleArm ? createBlankSet(true) : createBlankSet(false)));
  updateProgressNotice();
});

els.dupLastSessionBtn.addEventListener('click', ()=>{
  const previousDate = getPreviousSessionDateBefore(todayStr());
  if (!previousDate) return;

  const lastSession = getSessionByDate(previousDate);
  if (!lastSession.length) return;
  if (!state.logs[activeId]) state.logs[activeId] = [];

  lastSession.forEach((entry, idx)=>{
    state.logs[activeId].push({
      id:'entry_' + Date.now() + '_' + idx,
      date: todayStr(),
      exercise: entry.exercise,
      order: state.logs[activeId].filter(e => (e.date || '') === todayStr()).length,
      createdAt: new Date().toISOString(),
      progressSummary: '',
      sets: (entry.sets || []).map(s=> s.singleArm ? createBlankSet(true) : createBlankSet(false))
    });
  });

  sessionDraft = {date: todayStr()};
  saveState();
  renderMain();
  closePlusMenu();
});

function saveDraftPreview(){
  // Draft preview stays in memory only.
}



function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

els.inputDate.value = todayStr();

renderSidebar();
renderMain();
</script>
