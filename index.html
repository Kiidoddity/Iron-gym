<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IRON LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0d0d;--panel:#141414;--sidebar:#111111;--border:#2a2a2a;--accent:#e8ff47;--accent2:#ff4747;--text:#f0f0f0;--muted:#666;--entry-bg:#1a1a1a;--active:#1e1e1e;--sidebar-w:220px;--green:#7dff8a;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:auto;}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);display:flex;font-size:13px;touch-action:manipulation;-webkit-text-size-adjust:100%;}
    input,button,textarea,select{font:inherit;}
    input[type="text"],input[type="number"],input[type="date"]{font-size:16px;}
    #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease,min-width .25s ease,border-color .25s ease;position:relative;z-index:10;flex-shrink:0;}
    #sidebar.collapsed{width:0;min-width:0;border-right-color:transparent;}
    #sidebar-header{padding:24px 16px 16px;border-bottom:1px solid var(--border);white-space:nowrap;}
    #sidebar-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);line-height:1;}
    #sidebar-header p{color:var(--muted);font-size:10px;letter-spacing:1px;margin-top:4px;}
    #muscle-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;}
    #muscle-list::-webkit-scrollbar,#log-area::-webkit-scrollbar{width:3px;}
    #muscle-list::-webkit-scrollbar-thumb,#log-area::-webkit-scrollbar-thumb{background:var(--border);}
    .muscle-item{position:relative;overflow:hidden;border-left:3px solid transparent;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;}
    .muscle-item:hover .muscle-swipe-inner{background:var(--active);}
    .muscle-item.active{background:var(--active);border-left-color:var(--accent);}
    .muscle-delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;z-index:0;border:none;cursor:pointer;}
    .muscle-swipe-inner{display:flex;align-items:center;gap:8px;padding:11px 16px;transition:transform .22s ease;position:relative;z-index:1;background:var(--sidebar);}
    .muscle-name{flex:1;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
    .muscle-item.active .muscle-name{color:var(--accent);}
    .muscle-item.active .muscle-swipe-inner{background:var(--active);}
    .muscle-rename-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0;}
    .muscle-item:hover .muscle-rename-btn{opacity:1;}
    .muscle-rename-btn:hover{color:var(--accent);}
    .muscle-name-input{background:none;border:none;border-bottom:1px solid var(--accent);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;width:100%;outline:none;padding:1px 0;}
    #add-muscle-btn{margin:8px 14px 16px;background:none;border:1px dashed var(--border);color:var(--muted);padding:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;border-radius:2px;white-space:nowrap;}
    #add-muscle-btn:hover{border-color:var(--accent);color:var(--accent);}
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}
    #top-bar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0;}
    #top-left{min-width:0;}
    #no-group-hint{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    #group-info{display:none;}
    #main-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none;transition:color .15s;}
    #main-title:hover{color:var(--accent);}
    #main-subtitle{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    #top-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    #session-progress{color:var(--accent);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:none;}
    #menu-toggle{background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;padding:8px 10px;border-radius:2px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;transition:border-color .15s;}
    #menu-toggle:hover{border-color:var(--accent);}
    #menu-toggle span{display:block;width:16px;height:1.5px;background:var(--text);transition:background .15s;}
    #menu-toggle:hover span{background:var(--accent);}
    #content-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
    #no-selection{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);}
    #no-selection .giant{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#1a1a1a;letter-spacing:8px;}
    #no-selection p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    #log-area{flex:1;overflow-y:auto;padding:24px;display:none;}
    .empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);}
    .empty-state p{font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    .session-block{margin-bottom:24px;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    .session-details{background:var(--entry-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
    .session-summary{list-style:none;cursor:pointer;padding:18px 14px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;background:var(--panel);}
    .session-summary::-webkit-details-marker{display:none;}
    .session-shell{position:relative;}
    .delete-session-btn{position:absolute;top:8px;right:10px;z-index:3;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 6px;}
    .delete-session-btn:hover{color:var(--accent2);}
    .session-summary-left{min-width:0;display:flex;flex-direction:column;gap:4px;}
    .session-date{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .session-meta{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
    .session-chevron{color:var(--muted);font-size:16px;transition:transform .15s ease,color .15s ease;flex-shrink:0;position:relative;top:6px;}
    .session-details[open] .session-chevron{transform:rotate(90deg);color:var(--accent);}
    .session-content{padding:12px 12px 4px;}
    .rejoin-session-btn{background:#000;border:1px solid var(--border);color:#fff;padding:8px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-size:10px;margin:0 0 10px auto;display:inline-flex;align-self:flex-end;}
    .rejoin-session-btn:hover{border-color:#fff;}
    .exercise-swipe-shell{position:relative;overflow:hidden;border-radius:4px;margin-bottom:8px;}
    .exercise-delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;z-index:0;border-radius:0 4px 4px 0;border:none;cursor:pointer;}
    .exercise-card{background:var(--entry-bg);border:1px solid var(--border);border-radius:4px;position:relative;z-index:1;transition:transform .22s ease;}
    .exercise-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);gap:12px;}
    .exercise-name{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;min-width:0;flex:1;}
    .exercise-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .edit-entry-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;transition:color .15s;}
    .edit-entry-btn:hover{color:var(--accent);}
    .sets-table{width:100%;border-collapse:collapse;}
    .sets-table th{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 14px;text-align:left;font-weight:400;}
    .sets-table td{padding:6px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:top;}
    .sets-table td:first-child{color:var(--muted);font-size:10px;}
    .arm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .arm-box{display:flex;gap:6px;align-items:center;white-space:nowrap;}
    .arm-tag{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .progress-badge{margin:0 14px 10px;color:var(--green);font-size:10px;letter-spacing:1px;text-transform:uppercase;}
    #composer-wrap{border-top:1px solid var(--border);background:linear-gradient(to top,var(--bg),var(--panel));padding:14px 18px 18px;flex-shrink:0;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    #action-stack{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
    #plus-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;}
    #plus-btn{width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:var(--panel);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:34px;line-height:1;cursor:pointer;transition:.15s;}
    #plus-btn:hover{border-color:var(--accent);background:#181818;}
    #plus-btn.open{transform:rotate(45deg);}
    #plus-menu{display:none;flex-direction:column;gap:8px;align-items:center;width:min(420px,100%);}
    #plus-menu.open{display:flex;}
    #composer-actions-row{width:min(420px,100%);display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:2px;}
    .composer-spacer{display:none;}
    .action-btn{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-size:11px;transition:.15s;}
    .action-btn:hover{border-color:var(--accent);color:var(--accent);}
    .action-btn.danger:hover{border-color:var(--accent2);color:var(--accent2);}
    .session-btn{width:100%;}
    #session-form-wrap{display:none;width:min(520px,100%);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;position:relative;z-index:30;}
    #session-form-wrap.open{display:block;box-shadow:0 0 0 1px rgba(232,255,71,.15);}
    #form-topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
    #close-form-btn{background:none;border:none;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0 4px;}
    #close-form-btn:hover{color:var(--accent);}
    #session-form-wrap h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;}
    .form-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
    .form-row label,.mini-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .field,.num-input,.date-input{background:var(--entry-bg);border:1px solid var(--border);color:var(--text);outline:none;border-radius:3px;}
    .field,.date-input{width:100%;padding:10px 12px;}
    .field:focus,.num-input:focus,.date-input:focus{border-color:var(--accent);}
    .inline-grid{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:14px;}
    .sets-box{width:95px;}
    .num-input{width:100%;padding:10px;text-align:center;appearance:textfield;-moz-appearance:textfield;}
    .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{appearance:none;margin:0;}
    #sets-detail{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
    .set-row{border:1px solid var(--border);background:var(--entry-bg);border-radius:4px;padding:10px;display:flex;flex-direction:column;gap:10px;}
    .set-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .set-label{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .toggle-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .toggle-chip{border:1px solid var(--border);background:var(--panel);color:var(--muted);padding:6px 10px;border-radius:999px;cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;}
    .toggle-chip.active{color:var(--accent);border-color:var(--accent);}
    .set-inputs,.arm-inputs{display:flex;gap:10px;flex-wrap:wrap;}
    .input-block{flex:1;min-width:100px;}
    .arm-inputs{display:none;}
    .arm-inputs.active{display:flex;}
    .drop-set-wrap{display:none;border-top:1px solid var(--border);padding-top:8px;margin-top:2px;}
    .drop-set-wrap.active{display:block;}
    .drop-set-grid{display:grid;grid-template-columns:1.1fr .9fr .9fr;gap:8px;}
    .drop-set-grid .input-block{min-width:0;}
    .drop-title{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
    .drop-set-wrap .num-input{padding:8px 9px;font-size:14px;}
    .drop-set-wrap .mini-label{font-size:8px;letter-spacing:1px;}
    .helper{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
    .prev-target{font-size:9px;color:#7a7a7a;letter-spacing:1px;text-transform:uppercase;margin-top:5px;min-height:12px;}
    .notice{border:1px solid rgba(125,255,138,.25);background:rgba(125,255,138,.06);color:var(--green);padding:8px 10px;border-radius:4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;display:none;margin-bottom:12px;}
    .notice.show{display:block;}
    #save-feedback{display:none;color:var(--green);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:8px;}
    #save-feedback.show{display:block;}
    #form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
    #log-exercise-btn{background:var(--accent);color:#000;border:none;padding:10px 18px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-size:11px;}
    #log-exercise-btn:hover{background:#fff;}
    .hidden{display:none!important;}
    @media(max-width:700px){#top-bar{padding:12px 14px;}#main-title{font-size:30px;}#log-area{padding:14px;}#composer-wrap{padding:12px 14px 14px;}#session-form-wrap{padding:14px;}.drop-set-grid{grid-template-columns:1fr 1fr 1fr;gap:6px;}.drop-set-wrap .num-input{padding:7px 8px;font-size:13px;}}
  </style>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Log">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header"><h1>IRON<br>LOG</h1><p>GYM PROGRESSION</p></div>
    <div id="muscle-list"></div>
    <button id="add-muscle-btn">+ Add Group</button>
  </div>
  <div id="main">
    <div id="top-bar">
      <div id="top-left">
        <div id="no-group-hint">Select a group</div>
        <div id="group-info"><div id="main-title"></div><div id="main-subtitle"></div></div>
      </div>
      <div id="top-actions">
        <div id="session-progress">In Session</div>
        <button id="menu-toggle" title="Toggle menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div id="content-wrap">
      <div id="no-selection"><div class="giant">LIFT</div><p>Open the menu and pick a muscle group</p></div>
      <div id="log-area"></div>
      <div id="composer-wrap" class="hidden">
        <div id="action-stack">
          <div id="plus-wrap">
            <button id="plus-btn" title="Session actions">+</button>
            <div id="plus-menu">
              <button class="action-btn" id="start-session-btn">Start Session</button>
              <button class="action-btn" id="add-exercise-btn">Add Exercise</button>
              <button class="action-btn" id="duplicate-last-session-btn">Duplicate Last Session</button>
            </div>
          </div>
          <div id="composer-actions-row">
            <div class="composer-spacer"></div>
            <button class="action-btn danger session-btn" id="delete-session-composer-btn" style="display:none;">Delete Session</button>
            <button class="action-btn danger session-btn" id="end-session-btn" style="display:none;">End Session</button>
          </div>
          <div id="session-form-wrap">
            <div id="form-topbar"><h3>LOG EXERCISE</h3><button type="button" id="close-form-btn">x</button></div>
            <div id="progress-notice" class="notice"></div>
            <div class="form-row"><label class="mini-label">Date</label><input type="date" id="input-date" class="date-input"></div>
            <div class="form-row"><input type="text" id="exercise-name-input" class="field" placeholder="" list="exercise-name-list" autocomplete="off"></div>
            <datalist id="exercise-name-list"></datalist>
            <datalist id="drop-set-name-list"></datalist>
            <div class="inline-grid"><div class="sets-box"><label class="mini-label">Sets</label><input type="number" id="sets-input" class="num-input" min="1" max="20" placeholder=""></div></div>
            <div id="sets-detail"></div>
            <div id="form-actions"><button type="button" id="log-exercise-btn">Log Exercise</button></div>
            <div id="save-feedback">Exercise saved</div>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
const DEFAULT_GROUPS=[{id:'chest',name:'Chest'},{id:'back',name:'Back'},{id:'shoulders',name:'Shoulders'},{id:'arms',name:'Arms'},{id:'legs',name:'Legs'},{id:'core',name:'Core'}];
const UISTATE_KEY='ironlog_uistate';
function loadState(){try{return{groups:JSON.parse(localStorage.getItem('ironlog_groups')||'null')||DEFAULT_GROUPS,logs:JSON.parse(localStorage.getItem('ironlog_logs')||'{}')};}catch(e){return{groups:DEFAULT_GROUPS,logs:{}};}}
const state=loadState();
function saveState(){localStorage.setItem('ironlog_groups',JSON.stringify(state.groups));localStorage.setItem('ironlog_logs',JSON.stringify(state.logs));}
let activeId=null,sidebarOpen=true,plusOpen=false,sessionDraft=null,currentSessionDate=null,currentSessionId=null,editingEntryId=null;
const els={sidebar:document.getElementById('sidebar'),muscleList:document.getElementById('muscle-list'),noSelection:document.getElementById('no-selection'),logArea:document.getElementById('log-area'),composerWrap:document.getElementById('composer-wrap'),mainTitle:document.getElementById('main-title'),mainSubtitle:document.getElementById('main-subtitle'),noGroupHint:document.getElementById('no-group-hint'),groupInfo:document.getElementById('group-info'),menuToggle:document.getElementById('menu-toggle'),plusBtn:document.getElementById('plus-btn'),plusMenu:document.getElementById('plus-menu'),startSessionBtn:document.getElementById('start-session-btn'),addExerciseBtn:document.getElementById('add-exercise-btn'),dupLastSessionBtn:document.getElementById('duplicate-last-session-btn'),endSessionBtn:document.getElementById('end-session-btn'),deleteSessionComposerBtn:document.getElementById('delete-session-composer-btn'),formWrap:document.getElementById('session-form-wrap'),inputDate:document.getElementById('input-date'),exerciseName:document.getElementById('exercise-name-input'),setsInput:document.getElementById('sets-input'),setsDetail:document.getElementById('sets-detail'),sessionProgress:document.getElementById('session-progress'),progressNotice:document.getElementById('progress-notice'),logExerciseBtn:document.getElementById('log-exercise-btn'),saveFeedback:document.getElementById('save-feedback'),closeFormBtn:document.getElementById('close-form-btn'),exerciseNameList:document.getElementById('exercise-name-list'),dropSetNameList:document.getElementById('drop-set-name-list')};
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function escapeHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function getLogs(){return state.logs[activeId]||[];}
function saveUIState(){try{localStorage.setItem(UISTATE_KEY,JSON.stringify({activeId,sidebarOpen,currentSessionDate,currentSessionId,sessionDraft,editingEntryId,formOpen:els.formWrap.classList.contains('open'),formDate:els.inputDate.value,formExercise:els.exerciseName.value,formSets:els.setsInput.value,formSetData:Array.from(els.setsDetail.querySelectorAll('.set-row')).map(readSetRow)}));}catch(e){}}
document.addEventListener('visibilitychange',saveUIState);
window.addEventListener('pagehide',saveUIState);
document.addEventListener('input',(e)=>{if(e.target.closest('#session-form-wrap'))saveUIState();});
function toggleSidebar(force){sidebarOpen=force!==undefined?force:!sidebarOpen;els.sidebar.classList.toggle('collapsed',!sidebarOpen);}
els.menuToggle.addEventListener('click',()=>toggleSidebar());
els.mainTitle.addEventListener('click',()=>toggleSidebar());
let _openSwipeEl=null,_openSwipeInner=null;
function _closeOpenSwipe(){
  if(_openSwipeInner){_openSwipeInner.style.transition='';_openSwipeInner.style.transform='';}
  if(_openSwipeEl){_openSwipeEl.classList.remove('swiped-open');}
  _openSwipeEl=null;_openSwipeInner=null;
}
document.addEventListener('touchstart',(e)=>{
  if(_openSwipeEl&&!_openSwipeEl.contains(e.target)) _closeOpenSwipe();
},{passive:true});

function attachMuscleSwipe(item,groupId){
const inner=item.querySelector(’.muscle-swipe-inner’);
const delBtn=item.querySelector(’.muscle-delete-bg’);
let sx=0,dx=0,act=false;
item.addEventListener(‘touchstart’,(e)=>{
if(e.target.closest(’.muscle-rename-btn’)||e.target.closest(’.muscle-delete-bg’)) return;

function parseExpressionSum(v){if(v==null)return 0;const m=String(v).replace(/,/g,’’).match(/-?\d+(?:.\d+)?/g);return m?m.map(Number).reduce((a,b)=>a+b,0):0;}
function setVolume(set){if(!set)return 0;if(set.singleArm)return parseExpressionSum(set.leftReps)*parseExpressionSum(set.leftWeight)+parseExpressionSum(set.rightReps)*parseExpressionSum(set.rightWeight);return parseExpressionSum(set.reps)*parseExpressionSum(set.weight);}
function exerciseVolume(entry){return(entry.sets||[]).filter(s=>!s.dropSet).reduce((s,set)=>s+setVolume(set),0);}
function setProgressed(cur,prev){return setVolume(cur)>setVolume(prev);}
function dropSetScore(set){if(!set||!set.dropSet)return 0;return parseExpressionSum(set.dropReps)+parseExpressionSum(set.dropWeight);}
function compareProgress(cur,prev){if(!cur||!prev)return’’;return exerciseVolume(cur)>exerciseVolume(prev)?‘Nice progression!’:’’;}
function getEntrySessionId(e){return e&&e.sessionId?e.sessionId:`legacy:${e&&e.date||'No date'}`;}
function getSessionEntries(sid){return getLogs().filter(e=>getEntrySessionId(e)===sid).sort((a,b)=>(a.order||0)-(b.order||0));}
function getSessionGroups(logs){const map=new Map();logs.forEach(entry=>{const sid=getEntrySessionId(entry);if(!map.has(sid))map.set(sid,{sessionId:sid,date:entry.date||‘No date’,createdAt:’’,entries:[]});const g=map.get(sid);g.entries.push(entry);const cr=entry.createdAt||entry.id||’’;if(cr>g.createdAt)g.createdAt=cr;if((entry.date||’’)>(g.date||’’))g.date=entry.date||g.date;});const gs=Array.from(map.values());gs.forEach(g=>g.entries.sort((a,b)=>(a.order||0)-(b.order||0)));gs.sort((a,b)=>((b.date||’’)+(b.createdAt||’’)).localeCompare((a.date||’’)+(a.createdAt||’’)));return gs;}
function getPreviousSessionDateBefore(d){return[…new Set(getLogs().map(e=>e.date).filter(Boolean))].sort((a,b)=>b.localeCompare(a)).find(x=>x<d)||null;}
function getLatestSessionGroupBefore(d){return getSessionGroups(getLogs()).find(g=>(g.date||’’)<d)||null;}
function moveSessionDate(sid,newDate){if(!activeId||!sid||!newDate)return;getSessionEntries(sid).forEach((e,i)=>{e.date=newDate;e.order=i;});if(sessionDraft){sessionDraft.date=newDate;sessionDraft.sessionId=sid;}currentSessionDate=newDate;currentSessionId=sid;saveState();}
function findSameDayOtherSession(date){return getSessionGroups(getLogs()).find(g=>g.date===date&&g.sessionId!==currentSessionId&&g.entries.length>0)||null;}
function findPreviousSameExercise(name,date,excludeId){return getLogs().filter(e=>e.exercise&&e.exercise.toLowerCase()===name.toLowerCase()).filter(e=>e.id!==excludeId).filter(e=>!currentSessionId||getEntrySessionId(e)!==currentSessionId).sort((a,b)=>((b.date||’’)+(b.order||0)+(b.id||’’)).localeCompare((a.date||’’)+(a.order||0)+(a.id||’’))).find(e=>(e.date||’’)<=date)||null;}
function findPreviousDropMatch(exName,dropName,date,excludeId){if(!dropName)return null;const logs=getLogs().filter(e=>e.exercise&&e.exercise.toLowerCase()===String(exName||’’).toLowerCase()&&e.id!==excludeId).sort((a,b)=>((b.date||’’)+(b.id||’’)).localeCompare((a.date||’’)+(a.id||’’)));for(const entry of logs){if((entry.date||’’)>date)continue;for(const s of(entry.sets||[])){if(s.dropSet&&String(s.dropName||’’).trim().toLowerCase()===String(dropName).trim().toLowerCase())return s;}}return null;}
function buildNameDatalists(){const exN=[],drN=[],sEx=new Set(),sDr=new Set();Object.values(state.logs||{}).flat().forEach(e=>{const x=String(e.exercise||’’).trim();if(x&&!sEx.has(x.toLowerCase())){sEx.add(x.toLowerCase());exN.push(x);}(e.sets||[]).forEach(s=>{const d=String(s.dropName||’’).trim();if(d&&!sDr.has(d.toLowerCase())){sDr.add(d.toLowerCase());drN.push(d);}});});els.exerciseNameList.innerHTML=exN.sort((a,b)=>a.localeCompare(b)).map(n=>`<option value="${escapeHtml(n)}"></option>`).join(’’);els.dropSetNameList.innerHTML=drN.sort((a,b)=>a.localeCompare(b)).map(n=>`<option value="${escapeHtml(n)}"></option>`).join(’’);}

function normalizeSet(s){if(s.singleArm)return{singleArm:true,leftReps:String(s.leftReps??’’).trim(),rightReps:String(s.rightReps??’’).trim(),leftWeight:String(s.leftWeight??’’).trim(),rightWeight:String(s.rightWeight??’’).trim(),dropSet:!!s.dropSet,dropName:String(s.dropName??’’).trim(),dropReps:String(s.dropReps??’’).trim(),dropWeight:String(s.dropWeight??’’).trim()};return{singleArm:false,reps:String(s.reps??’’).trim(),weight:String(s.weight??’’).trim(),dropSet:!!s.dropSet,dropName:String(s.dropName??’’).trim(),dropReps:String(s.dropReps??’’).trim(),dropWeight:String(s.dropWeight??’’).trim()};}
function readSetRow(row){const sa=row.querySelector(’.single-arm-toggle’).classList.contains(‘active’);const ds=row.querySelector(’.drop-set-toggle’).classList.contains(‘active’);const base={dropSet:ds,dropName:row.querySelector(’.drop-name-input’)?.value||’’,dropReps:row.querySelector(’.drop-reps-input’)?.value||’’,dropWeight:row.querySelector(’.drop-weight-input’)?.value||’’};if(sa)return{singleArm:true,leftReps:row.querySelector(’.left-reps-input’).value,leftWeight:row.querySelector(’.left-weight-input’).value,rightReps:row.querySelector(’.right-reps-input’).value,rightWeight:row.querySelector(’.right-weight-input’).value,…base};return{singleArm:false,reps:row.querySelector(’.reps-input’).value,weight:row.querySelector(’.weight-input’).value,…base};}
function buildSetsDetail(existingSets=null){let count=parseInt(els.setsInput.value,10);if(!count||count<1){els.setsDetail.innerHTML=’’;return;}count=Math.min(Math.max(count,1),20);const prev=existingSets||Array.from(els.setsDetail.querySelectorAll(’.set-row’)).map(readSetRow);els.setsDetail.innerHTML=’’;for(let i=0;i<count;i++){const sd=prev[i]||createBlankSet(false);const row=document.createElement(‘div’);row.className=‘set-row’;row.innerHTML=`<div class="set-top"><div class="set-label">Set ${i+1}</div><div class="toggle-line"><span class="mini-label">Single Arm</span><button type="button" class="toggle-chip single-arm-toggle ${sd.singleArm?'active':''}">${sd.singleArm?'On':'Off'}</button><span class="mini-label">Drop Set</span><button type="button" class="toggle-chip drop-set-toggle ${sd.dropSet?'active':''}">${sd.dropSet?'On':'Off'}</button></div></div><div class="set-inputs ${sd.singleArm?'hidden':''}"><div class="input-block"><label class="mini-label">Reps</label><input type="text" class="num-input reps-input" value="${sd.reps??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-reps-target"></div></div><div class="input-block"><label class="mini-label">Weight (lbs)</label><input type="text" class="num-input weight-input" value="${sd.weight??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-weight-target"></div></div></div><div class="arm-inputs ${sd.singleArm?'active':''}"><div class="input-block"><label class="mini-label">Left Reps</label><input type="text" class="num-input left-reps-input" value="${sd.leftReps??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-left-reps-target"></div></div><div class="input-block"><label class="mini-label">Left Weight</label><input type="text" class="num-input left-weight-input" value="${sd.leftWeight??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-left-weight-target"></div></div><div class="input-block"><label class="mini-label">Right Reps</label><input type="text" class="num-input right-reps-input" value="${sd.rightReps??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-right-reps-target"></div></div><div class="input-block"><label class="mini-label">Right Weight</label><input type="text" class="num-input right-weight-input" value="${sd.rightWeight??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"><div class="prev-target prev-right-weight-target"></div></div></div><div class="drop-set-wrap ${sd.dropSet?'active':''}"><div class="drop-title">Drop Set</div><div class="drop-set-grid"><div class="input-block"><label class="mini-label">Name</label><input type="text" class="num-input drop-name-input" value="${sd.dropName??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false" list="drop-set-name-list"></div><div class="input-block"><label class="mini-label">Reps</label><input type="text" class="num-input drop-reps-input" value="${sd.dropReps??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"></div><div class="input-block"><label class="mini-label">Weight</label><input type="text" class="num-input drop-weight-input" value="${sd.dropWeight??''}" inputmode="text" autocapitalize="off" autocomplete="off" spellcheck="false"></div></div></div>`;
const sat=row.querySelector(’.single-arm-toggle’),dst=row.querySelector(’.drop-set-toggle’);
sat.addEventListener(‘click’,()=>{const a=sat.classList.toggle(‘active’);sat.textContent=a?‘On’:‘Off’;row.querySelector(’.set-inputs’).classList.toggle(‘hidden’,a);row.querySelector(’.arm-inputs’).classList.toggle(‘active’,a);updatePreviousTargets();updateProgressNotice();saveUIState();});
dst.addEventListener(‘click’,()=>{const a=dst.classList.toggle(‘active’);dst.textContent=a?‘On’:‘Off’;row.querySelector(’.drop-set-wrap’).classList.toggle(‘active’,a);updatePreviousTargets();updateProgressNotice();saveUIState();});
row.querySelectorAll(‘input’).forEach(inp=>{inp.addEventListener(‘input’,()=>{updatePreviousTargets();updateProgressNotice();});inp.addEventListener(‘focus’,()=>inp.select());});
els.setsDetail.appendChild(row);}updatePreviousTargets();updateProgressNotice();}
els.setsInput.addEventListener(‘input’,()=>buildSetsDetail());
function getReferenceExercise(){const name=els.exerciseName.value.trim().toLowerCase();const date=currentSessionDate||els.inputDate.value||todayStr();if(!name)return null;return findPreviousSameExercise(name,date,editingEntryId);}
function updatePreviousTargets(){const ref=getReferenceExercise();Array.from(els.setsDetail.querySelectorAll(’.set-row’)).forEach((row,i)=>{const ps=ref&&ref.sets?ref.sets[i]:null;const sa=row.querySelector(’.single-arm-toggle’).classList.contains(‘active’);const set=(sel,txt)=>{const el=row.querySelector(sel);if(el)el.textContent=txt||’’;};if(!ps){[’.prev-reps-target’,’.prev-weight-target’,’.prev-left-reps-target’,’.prev-left-weight-target’,’.prev-right-reps-target’,’.prev-right-weight-target’].forEach(s=>set(s,’’));return;}if(sa||ps.singleArm){set(’.prev-reps-target’,’’);set(’.prev-weight-target’,’’);set(’.prev-left-reps-target’,ps.leftReps!=null&&ps.leftReps!==’’?`Last: ${ps.leftReps}`:’’);set(’.prev-left-weight-target’,ps.leftWeight!=null&&ps.leftWeight!==’’?`Last: ${ps.leftWeight}`:’’);set(’.prev-right-reps-target’,ps.rightReps!=null&&ps.rightReps!==’’?`Last: ${ps.rightReps}`:’’);set(’.prev-right-weight-target’,ps.rightWeight!=null&&ps.rightWeight!==’’?`Last: ${ps.rightWeight}`:’’);}else{set(’.prev-reps-target’,ps.reps!=null&&ps.reps!==’’?`Last: ${ps.reps}`:’’);set(’.prev-weight-target’,ps.weight!=null&&ps.weight!==’’?`Last: ${ps.weight}`:’’);[’.prev-left-reps-target’,’.prev-left-weight-target’,’.prev-right-reps-target’,’.prev-right-weight-target’].forEach(s=>set(s,’’));}});}
function updateProgressNotice(){const name=els.exerciseName.value.trim();if(!name){els.progressNotice.textContent=’’;els.progressNotice.classList.remove(‘show’);return;}const date=currentSessionDate||els.inputDate.value||todayStr();const sc=parseInt(els.setsInput.value,10);if(!sc||!els.setsDetail.querySelector(’.set-row’)){els.progressNotice.textContent=’’;els.progressNotice.classList.remove(‘show’);return;}const sets=Array.from(els.setsDetail.querySelectorAll(’.set-row’)).map(readSetRow).map(normalizeSet);const preview={id:editingEntryId||‘preview’,date,exercise:name,sets};const prev=findPreviousSameExercise(name,date,editingEntryId);const summary=compareProgress(preview,prev);if(summary){els.progressNotice.textContent=summary;els.progressNotice.classList.add(‘show’);}else{els.progressNotice.textContent=’’;els.progressNotice.classList.remove(‘show’);}}
els.exerciseName.addEventListener(‘input’,()=>{updatePreviousTargets();updateProgressNotice();});
function buildExerciseFromForm(){const date=els.inputDate.value||currentSessionDate||todayStr();const exercise=els.exerciseName.value.trim();if(!exercise){els.exerciseName.focus();return null;}const sc=parseInt(els.setsInput.value,10);if(!sc){els.setsInput.focus();return null;}return{id:editingEntryId||’entry*’+Date.now(),date,exercise,sets:Array.from(els.setsDetail.querySelectorAll(’.set-row’)).map(readSetRow).map(normalizeSet)};}
function commitExerciseToLogs(exercise,keepOpen=true){if(!state.logs[activeId])state.logs[activeId]=[];exercise.progressSummary=compareProgress(exercise,findPreviousSameExercise(exercise.exercise,exercise.date,exercise.id));exercise.createdAt=exercise.createdAt||new Date().toISOString();if(editingEntryId){const idx=state.logs[activeId].findIndex(e=>e.id===editingEntryId);if(idx!==-1){exercise.order=state.logs[activeId][idx].order||0;exercise.createdAt=state.logs[activeId][idx].createdAt||exercise.createdAt;exercise.sessionId=state.logs[activeId][idx].sessionId||getEntrySessionId(state.logs[activeId][idx]);state.logs[activeId][idx]=exercise;}editingEntryId=null;sessionDraft=null;saveState();clearFormOnly();collapseExerciseForm();renderMain();return;}startSessionIfNeeded();currentSessionDate=exercise.date;exercise.sessionId=currentSessionId||(sessionDraft&&sessionDraft.sessionId)||getEntrySessionId(exercise);sessionDraft.date=exercise.date;sessionDraft.sessionId=exercise.sessionId;currentSessionId=exercise.sessionId;exercise.order=getSessionEntries(exercise.sessionId).length;state.logs[activeId].push(exercise);saveState();renderMain();els.saveFeedback.classList.add(‘show’);setTimeout(()=>els.saveFeedback.classList.remove(‘show’),1400);if(!keepOpen){finalizeSession();}else{clearFormOnly();els.inputDate.value=sessionDraft.date||todayStr();collapseExerciseForm();els.logArea.scrollTo({top:0,behavior:‘smooth’});}}
function saveCurrentExercise(keepOpen=true){const ex=buildExerciseFromForm();if(!ex)return false;commitExerciseToLogs(ex,keepOpen);return true;}
els.logExerciseBtn.addEventListener(‘click’,()=>saveCurrentExercise(true));
els.exerciseName.addEventListener(‘keydown’,(e)=>{if(e.key===‘Enter’){e.preventDefault();saveCurrentExercise(true);}});
function beginEditEntry(id){const entry=getLogs().find(e=>e.id===id);if(!entry)return;editingEntryId=id;currentSessionDate=entry.date||todayStr();currentSessionId=getEntrySessionId(entry);sessionDraft={date:currentSessionDate,sessionId:currentSessionId,exercise:entry.exercise||’’,order:entry.order||0,sets:(entry.sets||[]).map(s=>JSON.parse(JSON.stringify(s)))};plusOpen=false;els.plusBtn.classList.remove(‘open’);els.plusMenu.classList.remove(‘open’);openForm();populateFormFromDraft();els.saveFeedback.classList.remove(‘show’);updatePreviousTargets();updateProgressNotice();updatePlusMenuVisibility();requestAnimationFrame(()=>{try{els.formWrap.scrollIntoView({behavior:‘smooth’,block:‘nearest’});}catch(e){}try{els.exerciseName.focus({preventScroll:true});}catch(e){els.exerciseName.focus();}});}
function populateFormFromDraft(){const d=sessionDraft&&!sessionDraft.exercises?sessionDraft:null;if(!d)return;els.inputDate.value=currentSessionDate||d.date||els.inputDate.value||todayStr();els.exerciseName.value=d.exercise||’’;els.setsInput.value=d.sets?d.sets.length:’’;buildSetsDetail(d.sets||[]);}
function resetEditor(){editingEntryId=null;sessionDraft=null;currentSessionDate=null;currentSessionId=null;clearFormOnly();els.inputDate.value=todayStr();collapseExerciseForm();renderMain();}
els.closeFormBtn.addEventListener(‘click’,(e)=>{e.preventDefault();e.stopPropagation();collapseExerciseForm();saveUIState();});
document.addEventListener(‘click’,(e)=>{if(!els.formWrap.classList.contains(‘open’))return;if(e.target.closest(’#session-form-wrap’)||e.target.closest(’#plus-btn’)||e.target.closest(’#plus-menu’))return;collapseExerciseForm();saveUIState();});
function restoreUIState(){let ui=null;try{ui=JSON.parse(localStorage.getItem(UISTATE_KEY)||‘null’);}catch(e){}if(!ui)return false;if(ui.currentSessionId||ui.currentSessionDate||ui.sessionDraft){currentSessionId=ui.currentSessionId||null;currentSessionDate=ui.currentSessionDate||null;sessionDraft=ui.sessionDraft||null;}editingEntryId=ui.editingEntryId||null;if(ui.activeId&&state.groups.find(g=>g.id===ui.activeId))activeId=ui.activeId;if(ui.sidebarOpen===false)sidebarOpen=false;renderSidebar();renderMain();if(!sidebarOpen)els.sidebar.classList.add(‘collapsed’);const inSession=!!(currentSessionId||currentSessionDate||sessionDraft||editingEntryId);if(ui.formOpen&&inSession){openPlusMenu();openForm();if(ui.formDate)els.inputDate.value=ui.formDate;if(ui.formExercise)els.exerciseName.value=ui.formExercise;if(ui.formSets){els.setsInput.value=ui.formSets;buildSetsDetail(ui.formSetData||[]);}updatePreviousTargets();updateProgressNotice();updatePlusMenuVisibility();}return true;}
if(!els.inputDate.value)els.inputDate.value=todayStr();
const restored=restoreUIState();
if(!restored){renderSidebar();renderMain();}
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',async()=>{try{const r=await navigator.serviceWorker.register('./sw.js');if(r&&r.update)r.update();}catch(e){}});}</script>
